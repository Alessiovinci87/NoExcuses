<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>No Excuses — Live</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@300;400;500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#06060a;--bg-card:#0e0e16;--bg-raised:#14141e;--bg-hover:#1a1a28;
  --text:#ebe9e4;--text-dim:#8a8890;--text-muted:#4a4850;
  --accent:#d4a034;--accent-glow:rgba(212,160,52,.25);
  --intro:#40b878;--verse:#8898a8;--pre:#c088d0;--chorus:#e06898;
  --bridge:#5888d8;--solo:#f0c040;--riff:#e05848;--pause:#606878;
  --outro:#9868c8;--interlude:#6ab0a0;--link:#a0a060;
  --border:rgba(255,255,255,.06);--border-light:rgba(255,255,255,.1);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;user-select:none}

.screen{position:absolute;inset:0;display:flex;flex-direction:column;opacity:0;visibility:hidden;transition:opacity .3s,visibility .3s;overflow:hidden}
.screen.active{opacity:1;visibility:visible}

/* HOME */
.home-header{padding:20px 20px 0;display:flex;align-items:center;justify-content:space-between}
.home-brand{display:flex;align-items:baseline;gap:8px}
.home-brand h1{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:.08em}
.home-brand span{font-family:'JetBrains Mono',monospace;font-size:.6rem;color:var(--accent);letter-spacing:.15em;text-transform:uppercase}
.home-actions{display:flex;gap:8px}
.ib{width:40px;height:40px;border-radius:50%;border:1px solid var(--border-light);background:var(--bg-card);color:var(--text-dim);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.1rem;transition:all .2s}
.ib:active{background:var(--bg-hover);color:var(--accent);border-color:var(--accent);transform:scale(.92)}

.role-bar{display:flex;gap:6px;padding:16px 20px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.role-bar::-webkit-scrollbar{display:none}
.rp{font-family:'JetBrains Mono',monospace;font-size:.62rem;letter-spacing:.06em;text-transform:uppercase;padding:7px 14px;border-radius:20px;border:1px solid var(--border-light);background:transparent;color:var(--text-muted);cursor:pointer;white-space:nowrap;transition:all .2s;flex-shrink:0}
.rp.on{background:var(--accent);border-color:var(--accent);color:var(--bg);font-weight:500}

.slist{flex:1;overflow-y:auto;padding:4px 16px 120px;-webkit-overflow-scrolling:touch}
.slist::-webkit-scrollbar{width:0}

.sc{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:8px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:all .2s}
.sc:active{background:var(--bg-hover);transform:scale(.98)}
.sc-i{flex:1;min-width:0}
.sc-t{font-family:'Bebas Neue',sans-serif;font-size:1.15rem;letter-spacing:.04em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sc-s{font-size:.72rem;color:var(--text-muted);margin-top:2px;display:flex;gap:8px}
.sc-d{display:flex;gap:3px;flex-shrink:0;align-items:center}
.sc-dt{width:6px;height:6px;border-radius:50%}
.sc-a{display:flex;gap:6px;flex-shrink:0}
.sc-b{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:transparent;color:var(--text-muted);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.85rem}
.sc-b:active{color:var(--accent);border-color:var(--accent)}
.sc-go{background:var(--accent)!important;border-color:var(--accent)!important;color:var(--bg)!important;font-size:.7rem!important;font-weight:700;font-family:'Bebas Neue',sans-serif;letter-spacing:.1em}

.fab{position:fixed;bottom:24px;right:20px;width:56px;height:56px;border-radius:50%;background:var(--accent);border:none;color:var(--bg);font-size:1.8rem;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 24px var(--accent-glow);z-index:50}
.fab:active{transform:scale(.9)}

/* EDIT */
.eh{display:flex;align-items:center;gap:12px;padding:16px 20px;border-bottom:1px solid var(--border)}
.eh h2{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:.06em;flex:1}
.eb{flex:1;overflow-y:auto;padding:20px;-webkit-overflow-scrolling:touch}
.f{margin-bottom:16px}
.f label{font-family:'JetBrains Mono',monospace;font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);display:block;margin-bottom:6px}
.f input,.f select{width:100%;padding:12px 14px;border-radius:10px;border:1px solid var(--border-light);background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:.9rem;outline:none}
.f input:focus{border-color:var(--accent)}
.fr{display:flex;gap:10px}
.fr .f{flex:1}
.si{display:flex;align-items:center;gap:10px;padding:12px;background:var(--bg-raised);border-radius:10px;margin-bottom:6px;cursor:pointer}
.si:active{background:var(--bg-hover)}
.sb{font-family:'Bebas Neue',sans-serif;font-size:.85rem;letter-spacing:.08em;padding:4px 12px;border-radius:6px;min-width:70px;text-align:center}
.st{font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--text-dim);min-width:50px}
.sn{font-size:.7rem;color:var(--text-muted);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sx{width:28px;height:28px;border-radius:50%;border:1px solid var(--border);background:transparent;color:var(--riff);opacity:.4;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.7rem;flex-shrink:0}
.sx:active{opacity:1}
.ba{width:100%;padding:14px;border-radius:12px;border:2px dashed var(--accent);background:rgba(212,160,52,.05);color:var(--accent);font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:.08em;cursor:pointer;margin-top:12px}
.ba:active{background:rgba(212,160,52,.12)}
.bb{width:100%;padding:14px;border-radius:12px;border:none;background:var(--accent);color:var(--bg);font-family:'DM Sans',sans-serif;font-size:.95rem;font-weight:600;cursor:pointer;margin-top:12px}
.bb:active{filter:brightness(.85)}

/* NOTES MODAL */
.no{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(10px);z-index:300;display:flex;align-items:flex-end;justify-content:center;opacity:0;visibility:hidden;transition:all .3s}
.no.show{opacity:1;visibility:visible}
.np{background:var(--bg-card);border:1px solid var(--border-light);border-radius:20px 20px 0 0;width:100%;max-width:500px;max-height:85dvh;overflow-y:auto;padding:24px 20px 40px;transform:translateY(100%);transition:transform .35s cubic-bezier(.22,.61,.36,1)}
.no.show .np{transform:translateY(0)}
.nt{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:.06em;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.nt button{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);background:transparent;color:var(--text-dim);cursor:pointer;display:flex;align-items:center;justify-content:center}
.nf{margin-bottom:12px}
.nf label{font-family:'JetBrains Mono',monospace;font-size:.58rem;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);display:flex;align-items:center;gap:6px;margin-bottom:4px}
.nf label .dt{width:8px;height:8px;border-radius:50%}
.nf input{width:100%;padding:10px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:.85rem;outline:none}
.nf input:focus{border-color:var(--accent)}

/* TAP MAP */
.mh{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.mh h2{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:.06em;flex:1}
.mtimer{font-family:'Bebas Neue',sans-serif;font-size:3.5rem;text-align:center;padding:16px 0 4px;letter-spacing:.04em;color:var(--text-muted)}
.mtimer.on{color:var(--accent)}
.mstep{text-align:center;padding:6px 20px;font-family:'JetBrains Mono',monospace;font-size:.68rem;color:var(--text-muted);letter-spacing:.04em}
.mstep b{color:var(--accent)}
.mlog{flex:0 0 auto;max-height:130px;overflow-y:auto;padding:0 20px;margin:8px 0}
.mlog::-webkit-scrollbar{width:0}
.ml{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)}
.ml-b{font-family:'Bebas Neue',sans-serif;font-size:.7rem;letter-spacing:.06em;padding:2px 8px;border-radius:4px;min-width:55px;text-align:center}
.ml-t{font-family:'JetBrains Mono',monospace;font-size:.68rem;color:var(--text-dim)}
.ml-x{color:var(--riff);opacity:.4;cursor:pointer;margin-left:auto;padding:4px 8px;font-size:.75rem}
.ml-x:active{opacity:1}

.mtypes{display:flex;gap:5px;flex-wrap:wrap;padding:8px 20px;justify-content:center}
.mt{font-family:'JetBrains Mono',monospace;font-size:.58rem;letter-spacing:.05em;text-transform:uppercase;padding:6px 12px;border-radius:8px;border:2px solid var(--border);background:transparent;cursor:pointer;transition:all .15s}
.mt:active{transform:scale(.93)}
.mt.sel{transform:scale(1.08);font-weight:500}

.mtap{flex:1;display:flex;align-items:center;justify-content:center;margin:10px 20px;border-radius:16px;border:2px dashed var(--border-light);cursor:pointer;position:relative;overflow:hidden;min-height:100px;transition:all .15s}
.mtap.off{opacity:.3;pointer-events:none}
.mtap:active{border-color:var(--accent);background:rgba(212,160,52,.06)}
.mtap .fl{position:absolute;inset:0;background:var(--accent);opacity:0;pointer-events:none;transition:opacity .06s}
.mtap:active .fl{opacity:.2}
.mtap .lb{font-family:'Bebas Neue',sans-serif;text-align:center;line-height:1.5;color:var(--text-muted);padding:10px}
.mtap .lb b{display:block;font-size:1.8rem;color:var(--text)}

.mc{display:flex;gap:10px;padding:12px 20px 28px;justify-content:center}
.mb{padding:14px 28px;border-radius:12px;border:none;font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:.08em;cursor:pointer;transition:all .2s}
.mb:active{transform:scale(.95)}
.mb.go{background:var(--accent);color:var(--bg)}
.mb.st{background:var(--riff);color:#fff}
.mb.ok{background:var(--intro);color:#fff}
.mb.rs{background:transparent;border:1px solid var(--border);color:var(--text-muted)}

/* LIVE */
.live{background:#000}
.lx{position:fixed;top:12px;right:12px;z-index:400;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.5);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.9rem}

.cd{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;background:#000}
.cd-n{font-family:'Bebas Neue',sans-serif;font-size:14rem;line-height:1;color:var(--accent);animation:cp .35s ease}
.cd-i{font-family:'JetBrains Mono',monospace;font-size:.8rem;color:var(--text-muted);letter-spacing:.15em;margin-top:12px;text-transform:uppercase}
.cd-b{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;color:var(--text-dim);margin-top:4px}
@keyframes cp{0%{transform:scale(1.5);opacity:0}100%{transform:scale(1);opacity:1}}

.stg{position:absolute;inset:0;display:flex;overflow:hidden}
.sl{position:absolute;top:0;bottom:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;transition:all .55s cubic-bezier(.4,0,.2,1)}
.sl .tp{font-family:'Bebas Neue',sans-serif;letter-spacing:.12em;text-transform:uppercase;text-shadow:0 2px 20px rgba(0,0,0,.5)}
.sl .nt2{font-family:'JetBrains Mono',monospace;text-align:center;margin-top:16px;line-height:1.8;max-width:90%}
.sl .nx{position:absolute;bottom:20px;font-family:'JetBrains Mono',monospace;font-size:.6rem;color:rgba(255,255,255,.3);letter-spacing:.1em;text-transform:uppercase}

.lprog{position:absolute;bottom:0;left:0;height:3px;transition:width .15s linear;z-index:5}
.lbt{position:absolute;top:12px;left:50%;transform:translateX(-50%);width:10px;height:10px;border-radius:50%;background:var(--accent);opacity:0;z-index:5}
.lbt.on{opacity:1}

.ci{position:absolute;bottom:12px;right:12px;z-index:5;display:flex;align-items:center;gap:6px}
.ck{width:6px;height:6px;border-radius:50%;background:var(--text-muted);transition:all .08s}
.ck.on{background:var(--accent);transform:scale(1.4)}
.cbpm{font-family:'JetBrains Mono',monospace;font-size:.55rem;color:var(--text-muted)}

.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--accent);color:var(--bg);padding:10px 20px;border-radius:10px;font-size:.82rem;font-weight:600;z-index:999;animation:fu .3s ease}
.empty-msg{text-align:center;padding:60px 20px;color:var(--text-muted);font-size:.9rem;line-height:1.6}
.empty-msg b{color:var(--text-dim);display:block;margin-bottom:4px;font-size:1rem}
@keyframes fu{0%{opacity:0;transform:translateX(-50%) translateY(12px)}100%{opacity:1;transform:translateX(-50%) translateY(0)}}

@media(min-width:768px){
  body{display:flex;align-items:center;justify-content:center;padding:24px}
  .screen:not(.live){width:100%;max-width:480px;min-height:calc(100dvh - 48px);max-height:calc(100dvh - 48px);border-radius:18px;border:1px solid var(--border-light);box-shadow:0 8px 60px rgba(0,0,0,.4);position:relative}
  .live{border-radius:0;width:100vw;max-width:100vw;min-height:100dvh;max-height:100dvh;position:fixed;inset:0}
}
</style>
</head>
<body>

<!-- HOME -->
<div class="screen active" id="s0">
  <div class="home-header">
    <div class="home-brand"><h1>NE Live</h1><span>Conductor</span></div>
    <div class="home-actions">
      <button class="ib" onclick="doImport()" title="Importa">📥</button>
      <button class="ib" onclick="doExport()" title="Esporta">📤</button>
    </div>
  </div>
  <div class="role-bar" id="rBar"></div>
  <div class="slist" id="sList"></div>
  <button class="fab" onclick="addSong()">+</button>
</div>

<!-- EDIT -->
<div class="screen" id="s1">
  <div class="eh">
    <button class="ib" onclick="goHome()" style="font-size:.9rem">←</button>
    <h2 id="eT">Nuovo</h2>
    <button class="ib" onclick="delSong()" style="font-size:.85rem;color:var(--riff)">🗑</button>
  </div>
  <div class="eb">
    <div class="f"><label>Titolo</label><input id="fT"></div>
    <div class="f"><label>Artista</label><input id="fA"></div>
    <div class="fr">
      <div class="f"><label>BPM</label><input id="fB" type="number" value="120"></div>
      <div class="f"><label>Time Sig</label><select id="fS"><option value="4">4/4</option><option value="3">3/4</option><option value="6">6/8</option></select></div>
    </div>
    <div style="margin-top:20px">
      <div style="font-family:'JetBrains Mono',monospace;font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:10px;display:flex;justify-content:space-between"><span>Sezioni</span><span id="sCnt">0</span></div>
      <div id="sEl"></div>
    </div>
    <button class="ba" onclick="openMap()">🎯 Mappa i Tempi (Tap)</button>
    <button class="bb" onclick="saveSong()">Salva Brano</button>
  </div>
</div>

<!-- NOTES -->
<div class="no" id="nOv" onclick="if(event.target===this)closeN()">
  <div class="np">
    <div class="nt"><span id="nN">Note</span><button onclick="closeN()">✕</button></div>
    <div id="nF"></div>
    <button class="bb" onclick="saveN()">Salva Note</button>
  </div>
</div>

<!-- TAP MAP -->
<div class="screen" id="s2">
  <div class="mh">
    <button class="ib" onclick="closeMap()" style="font-size:.9rem">←</button>
    <h2>Mappa Tempi</h2>
  </div>
  <div class="mtimer" id="mTm">0:00.0</div>
  <div class="mstep" id="mSt">Premi <b>▶ AVVIA</b> poi fai partire la canzone</div>
  <div class="mlog" id="mLg"></div>
  <div class="mtypes" id="mTy"></div>
  <div class="mtap off" id="mTp" onclick="doTap()">
    <div class="fl"></div>
    <div class="lb" id="mTpL"><b>TAP</b>Avvia il timer prima</div>
  </div>
  <div class="mc" id="mCt"></div>
</div>

<!-- LIVE -->
<div class="screen live" id="s3">
  <button class="lx" onclick="exitLive()">✕</button>
  <div class="cd" id="lCd" style="display:none"></div>
  <div class="stg" id="lStg"></div>
  <div class="lprog" id="lPr"></div>
  <div class="lbt" id="lBt"></div>
  <div class="ci">
    <span class="ck" id="d0"></span><span class="ck" id="d1"></span>
    <span class="ck" id="d2"></span><span class="ck" id="d3"></span>
    <span class="cbpm" id="dBpm"></span>
  </div>
</div>

<script>
const ROLES=[{id:'ch1',n:'Chitarra 1',c:'#d4a034'},{id:'ch2',n:'Chitarra 2',c:'#e0a848'},{id:'bass',n:'Basso',c:'#5888d8'},{id:'drums',n:'Batteria',c:'#e05848'},{id:'voice',n:'Voce',c:'#e06898'}];
const ST=[{id:'intro',l:'Intro'},{id:'verse',l:'Strofa'},{id:'pre',l:'Pre-Rit'},{id:'chorus',l:'Ritornello'},{id:'bridge',l:'Bridge'},{id:'solo',l:'Solo'},{id:'riff',l:'Riff'},{id:'interlude',l:'Interlude'},{id:'link',l:'Link'},{id:'pause',l:'Pausa'},{id:'outro',l:'Outro'}];
const SC={intro:'#40b878',verse:'#8898a8',pre:'#c088d0',chorus:'#e06898',bridge:'#5888d8',solo:'#f0c040',riff:'#e05848',pause:'#606878',outro:'#9868c8',interlude:'#6ab0a0',link:'#a0a060'};
function sL(id){return(ST.find(t=>t.id===id)||{l:id}).l}
function E(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function fm(s){return Math.floor(s/60)+':'+String(Math.floor(s%60)).padStart(2,'0')}
function ff(s){return Math.floor(s/60)+':'+String(Math.floor(s%60)).padStart(2,'0')+'.'+Math.floor((s%1)*10)}
function toast(m){const t=document.createElement('div');t.className='toast';t.textContent=m;document.body.appendChild(t);setTimeout(()=>t.remove(),2500)}
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active')}
function goHome(){show('s0');renderHome()}

/* AUDIO */
let actx=null;
function A(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();if(actx.state==='suspended')actx.resume();return actx}
function beep(hi){
  try{const c=A(),o=c.createOscillator(),g=c.createGain();
  o.connect(g);g.connect(c.destination);
  o.frequency.value=hi?1200:800;o.type='square';
  g.gain.setValueAtTime(hi?.5:.22,c.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.05);
  o.start(c.currentTime);o.stop(c.currentTime+.05)}catch(e){}}

// Unlock audio on first touch
document.addEventListener('touchstart',function u(){A();beep(false);document.removeEventListener('touchstart',u)},{once:true});
document.addEventListener('click',function u(){A();document.removeEventListener('click',u)},{once:true});

/* STATE */
let songs=[],role='ch1',eI=-1,eS=[];
let mOn=false,mT0=0,mE=0,mAf=0,mSel='intro';
let nI=-1;

function load(){try{songs=JSON.parse(localStorage.getItem('nel'))||[]}catch(e){songs=[]}
try{role=localStorage.getItem('ner')||'ch1'}catch(e){}}
function save(){localStorage.setItem('nel',JSON.stringify(songs));localStorage.setItem('ner',role)}

/* HOME */
function renderHome(){
  document.getElementById('rBar').innerHTML=ROLES.map(r=>'<button class="rp'+(r.id===role?' on':'')+'" onclick="setRole(\''+r.id+'\')">'+r.n+'</button>').join('');
  const el=document.getElementById('sList');
  if(!songs.length){el.innerHTML='<div class="empty-msg"><b>Nessun brano</b>Premi + per aggiungerne uno</div>';return}
  el.innerHTML=songs.map((s,i)=>{
    const dots=(s.sections||[]).slice(0,12).map(x=>'<span class="sc-dt" style="background:'+SC[x.type]+'"></span>').join('');
    return '<div class="sc"><div class="sc-i"><div class="sc-t">'+E(s.title)+'</div><div class="sc-s"><span>'+E(s.artist||'—')+'</span><span>♩ '+(s.bpm||'?')+'</span><span>'+(s.sections||[]).length+' sez</span></div></div><div class="sc-d">'+dots+'</div><div class="sc-a"><button class="sc-b" onclick="event.stopPropagation();editS('+i+')">✎</button><button class="sc-b sc-go" onclick="event.stopPropagation();goLive('+i+')">▶</button></div></div>'
  }).join('');
}
function setRole(r){role=r;save();renderHome()}

/* EDIT */
function addSong(){eI=-1;eS=[];document.getElementById('eT').textContent='Nuovo Brano';document.getElementById('fT').value='';document.getElementById('fA').value='';document.getElementById('fB').value='120';document.getElementById('fS').value='4';renderSecs();show('s1')}
function editS(i){eI=i;const s=songs[i];document.getElementById('eT').textContent='Modifica';document.getElementById('fT').value=s.title;document.getElementById('fA').value=s.artist||'';document.getElementById('fB').value=s.bpm||120;document.getElementById('fS').value=s.timeSig||'4';eS=JSON.parse(JSON.stringify(s.sections||[]));renderSecs();show('s1')}
function renderSecs(){
  document.getElementById('sCnt').textContent=eS.length;
  const el=document.getElementById('sEl');
  if(!eS.length){el.innerHTML='<div style="text-align:center;padding:20px;color:var(--text-muted);font-size:.8rem">Usa "Mappa i Tempi" per aggiungere sezioni</div>';return}
  el.innerHTML=eS.map((s,i)=>{
    const n=(s.notes&&s.notes[role])||'';
    return '<div class="si" onclick="openN('+i+')"><span class="sb" style="background:'+SC[s.type]+'22;color:'+SC[s.type]+'">'+sL(s.type)+'</span><span class="st">'+fm(s.time)+'</span><span class="sn">'+(n?E(n):'<i style="opacity:.4">+ note</i>')+'</span><button class="sx" onclick="event.stopPropagation();eS.splice('+i+',1);renderSecs()">✕</button></div>'
  }).join('');
}
function saveSong(){
  const t=document.getElementById('fT').value.trim();if(!t){toast('Inserisci un titolo');return}
  const o={title:t,artist:document.getElementById('fA').value.trim(),bpm:parseInt(document.getElementById('fB').value)||120,timeSig:document.getElementById('fS').value,sections:eS};
  if(eI>=0)songs[eI]=o;else songs.push(o);save();goHome();toast('Salvato!')
}
function delSong(){if(eI<0){goHome();return}if(confirm('Eliminare?')){songs.splice(eI,1);save();goHome()}}

/* NOTES */
function openN(i){nI=i;const s=eS[i];
  document.getElementById('nN').textContent=sL(s.type)+' — '+fm(s.time);
  document.getElementById('nF').innerHTML=ROLES.map(r=>'<div class="nf"><label><span class="dt" style="background:'+r.c+'"></span>'+r.n+'</label><input id="nf_'+r.id+'" value="'+E((s.notes||{})[r.id]||'')+'" placeholder="Note per '+r.n+'"></div>').join('');
  document.getElementById('nOv').classList.add('show');
}
function closeN(){document.getElementById('nOv').classList.remove('show')}
function saveN(){if(nI<0)return;const n={};ROLES.forEach(r=>{const v=document.getElementById('nf_'+r.id).value.trim();if(v)n[r.id]=v});eS[nI].notes=n;closeN();renderSecs()}

/* TAP MAP */
function openMap(){mOn=false;mE=0;mSel='intro';renderMap();show('s2')}
function closeMap(){cancelAnimationFrame(mAf);mOn=false;renderSecs();show('s1')}
function renderMap(){
  // Timer
  const tm=document.getElementById('mTm');tm.textContent=ff(mE);tm.classList.toggle('on',mOn);
  // Step hint
  document.getElementById('mSt').innerHTML=mOn?'1⃣ Seleziona tipo ↓  poi 2⃣ <b>TAP</b> quando inizia':'Premi <b>▶ AVVIA</b> poi fai partire la canzone';
  // Log
  const lg=document.getElementById('mLg');
  lg.innerHTML=eS.map((s,i)=>'<div class="ml"><span class="ml-b" style="background:'+SC[s.type]+'22;color:'+SC[s.type]+'">'+sL(s.type)+'</span><span class="ml-t">'+ff(s.time)+'</span><span class="ml-x" onclick="eS.splice('+i+',1);renderMap()">✕</span></div>').join('');
  lg.scrollTop=lg.scrollHeight;
  // Types
  document.getElementById('mTy').innerHTML=ST.map(t=>{const on=t.id===mSel;return'<button class="mt'+(on?' sel':'')+'" style="color:'+SC[t.id]+';border-color:'+(on?SC[t.id]:'var(--border)')+';'+(on?'background:'+SC[t.id]+'20':'')+'" onclick="mSel=\''+t.id+'\';renderMap()">'+t.l+'</button>'}).join('');
  // Tap zone
  const tp=document.getElementById('mTp');tp.classList.toggle('off',!mOn);
  document.getElementById('mTpL').innerHTML=mOn?'<b style="color:'+SC[mSel]+'">'+sL(mSel).toUpperCase()+'</b><span style="font-size:.9rem">TAP quando inizia</span>':'<b>TAP</b>Avvia il timer prima';
  // Controls
  const ct=document.getElementById('mCt');
  ct.innerHTML=mOn
    ?'<button class="mb st" onclick="stopMap()">⏹ STOP</button>'
    :'<button class="mb go" onclick="startMap()">▶ AVVIA</button>'+(eS.length?'<button class="mb rs" onclick="eS=[];mE=0;renderMap()">Reset</button><button class="mb ok" onclick="closeMap()">✓ Fatto</button>':'');
}
function startMap(){A();mOn=true;mT0=performance.now()-mE*1000;renderMap();tickMap()}
function stopMap(){mOn=false;cancelAnimationFrame(mAf);renderMap()}
function tickMap(){if(!mOn)return;mE=(performance.now()-mT0)/1000;document.getElementById('mTm').textContent=ff(mE);mAf=requestAnimationFrame(tickMap)}
function doTap(){
  if(!mOn)return;
  beep(true);
  eS.push({type:mSel,time:Math.round(mE*10)/10,notes:{}});
  eS.sort((a,b)=>a.time-b.time);
  // Auto-suggest next
  const flow=['intro','verse','pre','chorus','verse','pre','chorus','bridge','solo','chorus','outro'];
  const ci=flow.indexOf(mSel);if(ci>=0&&ci<flow.length-1)mSel=flow[ci+1];
  renderMap();
}

/* ========== LIVE ========== */
let lS=null,lOn=false,lAf=0,lT0=0,lT=0,lB=0,lLB=0,lSS='';

function goLive(i){
  lS=songs[i];
  if(!lS.sections||!lS.sections.length){toast('Aggiungi sezioni prima!');return}
  A(); // Ensure audio context before countdown
  show('s3');
  document.getElementById('dBpm').textContent=lS.bpm+' BPM';
  lOn=false;lT=0;lB=0;lLB=0;lSS='';
  document.getElementById('lStg').innerHTML='';
  document.getElementById('lPr').style.width='0';
  countdown();
}
function exitLive(){lOn=false;cancelAnimationFrame(lAf);goHome()}

function countdown(){
  const bpm=lS.bpm||120;
  const ms=60000/bpm;
  const ts=parseInt(lS.timeSig)||4;
  let left=ts;
  const cd=document.getElementById('lCd');
  cd.style.display='flex';

  function tick(){
    if(left<=0){cd.style.display='none';launchLive();return}
    cd.innerHTML='<div class="cd-n">'+left+'</div><div class="cd-i">Pronti</div><div class="cd-b">'+lS.bpm+' BPM</div>';
    beep(left===ts);
    flashD(ts-left,ts);
    left--;
    setTimeout(tick,ms);
  }
  setTimeout(tick,400);
}

function launchLive(){
  lOn=true;lT0=performance.now();lB=0;lLB=0;lSS='';
  liveRender();
  tickLive();
}

function tickLive(){
  if(!lOn)return;
  lT=(performance.now()-lT0)/1000;
  const bpm=lS.bpm||120;
  const bi=60/bpm;
  const ts=parseInt(lS.timeSig)||4;

  // Click
  if(lT>=lLB+bi){
    lB++;lLB+=bi;
    beep(lB%ts===1||lB===1);
    flashD((lB-1)%ts,ts);
    const b=document.getElementById('lBt');b.classList.add('on');setTimeout(()=>b.classList.remove('on'),80);
  }

  liveRender();
  liveProgress();

  // End
  const last=lS.sections[lS.sections.length-1];
  if(lT>last.time+30){exitLive();return}
  lAf=requestAnimationFrame(tickLive);
}

function liveProgress(){
  const secs=lS.sections;
  let ci=-1;for(let j=secs.length-1;j>=0;j--)if(lT>=secs[j].time){ci=j;break}
  if(ci<0)return;
  const cur=secs[ci];
  const ne=ci+1<secs.length?secs[ci+1].time:cur.time+30;
  const p=Math.min((lT-cur.time)/(ne-cur.time)*100,100);
  const bar=document.getElementById('lPr');
  bar.style.width=p+'%';bar.style.background=SC[cur.type]||'#888';
}

function liveRender(){
  const secs=lS.sections;
  let ci=-1;for(let j=secs.length-1;j>=0;j--)if(lT>=secs[j].time){ci=j;break}
  let ni=-1;
  if(ci+1<secs.length){const g=secs[ci+1].time-lT;if(g<=4&&g>0)ni=ci+1}

  const k=ci+'/'+ni;if(k===lSS)return;lSS=k;
  const stg=document.getElementById('lStg');

  // Before first section
  if(ci<0){
    const f=secs[0];const fc=SC[f.type]||'#888';
    stg.innerHTML='<div class="sl" style="left:0;width:100%;background:#000"><div class="tp" style="font-size:clamp(2rem,8vw,5rem);color:'+fc+';opacity:.4">'+sL(f.type)+'</div><div class="nt2" style="font-size:clamp(.8rem,2.5vw,1.2rem);color:rgba(255,255,255,.3)">In arrivo...</div></div>';
    return;
  }

  const cur=secs[ci];const cc=SC[cur.type]||'#888';const cl=sL(cur.type);
  const cn=(cur.notes&&cur.notes[role])||'';

  // SPLIT
  if(ni>=0){
    const nx=secs[ni];const nc=SC[nx.type]||'#888';const nl=sL(nx.type);
    const nn=(nx.notes&&nx.notes[role])||'';
    stg.innerHTML=
      '<div class="sl" style="left:0;width:50%;background:'+cc+'12;opacity:.55">'+
        '<div class="tp" style="font-size:clamp(1.5rem,5vw,3rem);color:'+cc+'">'+cl+'</div>'+
        (cn?'<div class="nt2" style="font-size:clamp(.85rem,2.8vw,1.3rem);color:rgba(255,255,255,.6)">'+E(cn)+'</div>':'')+
      '</div>'+
      '<div class="sl" style="left:50%;width:50%;background:'+nc+'15;border-left:2px solid rgba(255,255,255,.1)">'+
        '<div style="position:absolute;top:16px;left:50%;transform:translateX(-50%);font-family:JetBrains Mono,monospace;font-size:.55rem;color:rgba(255,255,255,.4);letter-spacing:.12em;text-transform:uppercase">PROSSIMA</div>'+
        '<div class="tp" style="font-size:clamp(1.8rem,6vw,3.5rem);color:'+nc+'">'+nl+'</div>'+
        (nn?'<div class="nt2" style="font-size:clamp(.95rem,3vw,1.4rem);color:rgba(255,255,255,.75)">'+E(nn)+'</div>':'')+
      '</div>';
    return;
  }

  // FULL
  const isLast=ci===secs.length-1;
  const nxL=(!isLast&&ci+1<secs.length)?sL(secs[ci+1].type):'';
  stg.innerHTML=
    '<div class="sl" style="left:0;width:100%;background:'+cc+'0d">'+
      '<div class="tp" style="font-size:clamp(3rem,12vw,8rem);color:'+cc+'">'+cl+'</div>'+
      (cn?'<div class="nt2" style="font-size:clamp(1.4rem,5vw,2.6rem);color:rgba(255,255,255,.85)">'+E(cn)+'</div>':'')+
      (nxL?'<div class="nx">prossima: '+nxL+'</div>':'')+
      (isLast?'<div class="nx" style="color:var(--riff)">ULTIMO</div>':'')+
    '</div>';
}

function flashD(idx,ts){for(let i=0;i<4;i++){const d=document.getElementById('d'+i);if(!d)continue;d.classList.toggle('on',i===idx);d.style.display=i<ts?'':'none'}}

/* IMPORT/EXPORT */
function doImport(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.json';
  inp.onchange=e=>{const f=e.target.files[0];if(!f)return;
    const r=new FileReader();r.onload=ev=>{try{
      const d=JSON.parse(ev.target.result);
      if(Array.isArray(d)){
        if(d[0]&&d[0].sections){songs=songs.concat(d)}
        else if(d[0]&&d[0].items){
          songs=songs.concat(d.map(s=>({title:s.title||'',artist:s.artist||'',bpm:parseInt(s.bpm)||120,timeSig:'4',
            sections:(s.items||[]).filter(it=>it.t==='div').map((it,j)=>({type:it.type||'verse',time:j*15,notes:it.note?{ch1:it.note}:{}}))})))}
        save();renderHome();toast('Importato!')
      }}catch(er){toast('File non valido')}};r.readAsText(f)};inp.click();
}
function doExport(){
  const j=JSON.stringify(songs,null,2);const b=new Blob([j],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='ne-live.json';
  document.body.appendChild(a);a.click();setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(a.href)},200);
}

load();renderHome();
</script>
