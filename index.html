<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#08080c">
<title>Playlist</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@300;400;500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#08080c;--bg-card:#101018;--bg-raised:#161622;--bg-hover:#1c1c2e;
  --text:#e8e6e1;--text-dim:#8a8890;--text-muted:#4a4850;
  --accent:#d4a034;
  --solo:#f0c040;--bridge:#5888d8;--riff:#e05848;--pause:#606878;
  --intro:#40b878;--outro:#9868c8;--chorus:#e06898;--verse:#8898a8;--pre:#c088d0;
  --interlude:#6ab0a0;--link:#a0a060;
  --border:rgba(255,255,255,0.06);--border-light:rgba(255,255,255,0.1);
  --radius:14px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{font-size:16px}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;-webkit-font-smoothing:antialiased;overflow-x:hidden}

#splash{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;align-items:center;justify-content:center;transition:opacity .8s ease,visibility .8s ease}
#splash.hide{opacity:0;visibility:hidden;pointer-events:none}
#splash img{width:min(75vw,360px);animation:splashPulse 2s ease-in-out infinite alternate}
@keyframes splashPulse{0%{filter:brightness(.8) drop-shadow(0 0 20px rgba(212,160,52,0))}100%{filter:brightness(1.1) drop-shadow(0 0 40px rgba(212,160,52,.3))}}
#app{opacity:0;transition:opacity .6s ease .3s}
#app.show{opacity:1}

.header{position:sticky;top:0;z-index:100;background:rgba(8,8,12,.88);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid var(--border);padding:14px 18px;display:flex;align-items:center;justify-content:space-between}
.header-logo{display:flex;align-items:center;gap:12px}
.header-logo img{height:34px;opacity:.9}
.header h1{font-family:'Instrument Serif',serif;font-size:1.15rem;font-weight:400;color:var(--text-dim);letter-spacing:.02em}
.btn-icon{width:42px;height:42px;border-radius:50%;border:1px solid var(--border-light);background:var(--bg-card);color:var(--text-dim);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;font-size:1.3rem}
.btn-icon:active{background:var(--bg-hover);color:var(--accent);border-color:var(--accent);transform:scale(.94)}

.setlist{padding:8px 14px 140px;max-width:640px;margin:0 auto}
.song-count{font-family:'JetBrains Mono',monospace;font-size:.7rem;color:var(--text-muted);letter-spacing:.1em;text-transform:uppercase;padding:12px 4px 14px}

/* SONG CARD */
.song{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;overflow:hidden;transition:border-color .3s,box-shadow .3s;animation:fadeInUp .3s ease both}
.song:nth-child(n+2){animation-delay:calc((var(--i,0)) * .03s)}
@keyframes fadeInUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.song.open{border-color:rgba(212,160,52,.2);box-shadow:0 2px 30px rgba(212,160,52,.04)}
.song-header{display:flex;align-items:center;padding:14px 14px 14px 6px;cursor:pointer;gap:8px;-webkit-tap-highlight-color:transparent;user-select:none;transition:background .15s}
.song-header:active{background:var(--bg-hover)}
.drag-handle{display:flex;flex-direction:column;gap:3px;padding:8px 6px;cursor:grab;touch-action:none;opacity:.3;transition:opacity .2s;flex-shrink:0}
.drag-handle:active{opacity:.8}
.drag-handle span{display:block;width:14px;height:2px;background:var(--text-dim);border-radius:1px}
.song.dragging{opacity:.5;border-color:var(--accent);transform:scale(.97);z-index:50;position:relative}
.song.drag-over-top{border-top:2px solid var(--accent);margin-top:-2px}
.song.drag-over-bottom{border-bottom:2px solid var(--accent);margin-bottom:-2px}
.song-num{font-family:'JetBrains Mono',monospace;font-size:.68rem;color:var(--text-muted);min-width:26px;text-align:center}
.song-info{flex:1;min-width:0}
.song-title{font-family:'Instrument Serif',serif;font-size:1.2rem;font-weight:400;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.song-artist{font-size:.75rem;color:var(--text-muted);margin-top:2px}
.song-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px}
.mini-tag{font-family:'JetBrains Mono',monospace;font-size:.55rem;letter-spacing:.06em;text-transform:uppercase;padding:2px 6px;border-radius:3px;line-height:1.4}
.mini-tag.solo{background:rgba(240,192,64,.12);color:var(--solo)}
.mini-tag.bridge{background:rgba(88,136,216,.12);color:var(--bridge)}
.mini-tag.riff{background:rgba(224,88,72,.12);color:var(--riff)}
.mini-tag.pause{background:rgba(96,104,120,.15);color:var(--pause)}
.mini-tag.intro{background:rgba(64,184,120,.12);color:var(--intro)}
.mini-tag.outro{background:rgba(152,104,200,.12);color:var(--outro)}
.mini-tag.chorus{background:rgba(224,104,152,.12);color:var(--chorus)}
.mini-tag.verse{background:rgba(136,152,168,.12);color:var(--verse)}
.mini-tag.pre{background:rgba(192,136,208,.12);color:var(--pre)}
.mini-tag.interlude{background:rgba(106,176,160,.12);color:var(--interlude)}
.mini-tag.link{background:rgba(160,160,96,.12);color:var(--link)}
.chevron{color:var(--text-muted);transition:transform .3s ease;font-size:.75rem;flex-shrink:0}
.song.open .chevron{transform:rotate(90deg);color:var(--accent)}

.song-body{max-height:0;overflow:hidden;transition:max-height .45s cubic-bezier(.25,0,0,1)}
.song.open .song-body{max-height:20000px;transition:max-height .7s cubic-bezier(.25,0,.2,1)}
.song-content{padding:0 14px 14px;border-top:1px solid var(--border)}

/* SCROLL */
.scroll-control{display:flex;align-items:center;gap:10px;padding:12px 0;margin-bottom:6px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.scroll-btn{width:38px;height:38px;border-radius:50%;border:1px solid var(--border-light);background:var(--bg-raised);color:var(--text-dim);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;font-size:.85rem;flex-shrink:0}
.scroll-btn.active{background:var(--accent);border-color:var(--accent);color:var(--bg)}
.scroll-btn:active{transform:scale(.92)}
.speed-slider-wrap{flex:1;min-width:120px;display:flex;align-items:center;gap:8px}
.speed-slider{-webkit-appearance:none;appearance:none;width:100%;height:6px;border-radius:3px;background:var(--bg-raised);outline:none;cursor:pointer}
.speed-slider::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:var(--accent);border:2px solid var(--bg);cursor:pointer;box-shadow:0 0 8px rgba(212,160,52,.3)}
.speed-slider::-moz-range-thumb{width:22px;height:22px;border-radius:50%;background:var(--accent);border:2px solid var(--bg);cursor:pointer}
.speed-value{font-family:'JetBrains Mono',monospace;font-size:.65rem;color:var(--accent);min-width:28px;text-align:center}
.speed-save-btn{font-family:'JetBrains Mono',monospace;font-size:.58rem;letter-spacing:.04em;text-transform:uppercase;padding:5px 10px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;transition:all .2s;flex-shrink:0}
.speed-save-btn:active{border-color:var(--accent);color:var(--accent);background:rgba(212,160,52,.08)}
.suggested-speed{font-family:'JetBrains Mono',monospace;font-size:.6rem;color:var(--intro);margin-top:4px;width:100%;padding-left:48px;opacity:.8}

/* DISPLAY: section dividers */
.sec-divider{display:flex;align-items:center;gap:10px;margin:18px 0 8px}
.sec-divider .dline{flex:1;height:1px;background:var(--border-light)}
.sec-divider .dbadge{font-family:'JetBrains Mono',monospace;font-size:.62rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;padding:4px 14px;border-radius:20px;flex-shrink:0;white-space:nowrap}
.sec-divider .dbadge.intro{background:rgba(64,184,120,.12);color:var(--intro);border:1px solid rgba(64,184,120,.2)}
.sec-divider .dbadge.verse{background:rgba(136,152,168,.1);color:var(--verse);border:1px solid rgba(136,152,168,.15)}
.sec-divider .dbadge.pre{background:rgba(192,136,208,.1);color:var(--pre);border:1px solid rgba(192,136,208,.15)}
.sec-divider .dbadge.chorus{background:rgba(224,104,152,.1);color:var(--chorus);border:1px solid rgba(224,104,152,.15)}
.sec-divider .dbadge.bridge{background:rgba(88,136,216,.1);color:var(--bridge);border:1px solid rgba(88,136,216,.15)}
.sec-divider .dbadge.solo{background:rgba(240,192,64,.12);color:var(--solo);border:1px solid rgba(240,192,64,.2)}
.sec-divider .dbadge.riff{background:rgba(224,88,72,.1);color:var(--riff);border:1px solid rgba(224,88,72,.15)}
.sec-divider .dbadge.pause{background:rgba(96,104,120,.12);color:var(--pause);border:1px solid rgba(96,104,120,.2)}
.sec-divider .dbadge.outro{background:rgba(152,104,200,.1);color:var(--outro);border:1px solid rgba(152,104,200,.15)}
.sec-divider .dbadge.interlude{background:rgba(106,176,160,.1);color:var(--interlude);border:1px solid rgba(106,176,160,.15)}
.sec-divider .dbadge.link{background:rgba(160,160,96,.1);color:var(--link);border:1px solid rgba(160,160,96,.15)}
.sec-note{text-align:center;font-family:'DM Sans',sans-serif;font-size:.7rem;font-style:italic;color:var(--accent);opacity:.55;margin:-4px 0 6px}
.sec-inline-note{font-family:'DM Sans',sans-serif;font-size:.68rem;font-style:italic;color:var(--accent);opacity:.7;flex-shrink:0;white-space:nowrap}

.lyrics-display{font-family:'JetBrains Mono',monospace;font-size:.8rem;line-height:1.8;color:var(--text-dim);white-space:pre-wrap;padding-left:10px;border-left:2px solid var(--border);margin-bottom:4px}

.song-actions{display:flex;justify-content:flex-end;padding-top:10px;margin-top:12px;border-top:1px solid var(--border);gap:6px}
.btn-small{font-family:'JetBrains Mono',monospace;font-size:.62rem;letter-spacing:.05em;text-transform:uppercase;padding:6px 12px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;transition:all .2s}
.btn-small:active{transform:scale(.95)}
.btn-small.del:active{border-color:var(--riff);color:var(--riff)}
.btn-small.edit:active{border-color:var(--accent);color:var(--accent)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(10px);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;visibility:hidden;transition:all .3s}
.modal-overlay.show{opacity:1;visibility:visible}
.modal{background:var(--bg-card);border:1px solid var(--border-light);border-radius:20px 20px 0 0;width:100%;max-width:640px;max-height:90dvh;overflow-y:auto;padding:24px 20px 40px;transform:translateY(100%);transition:transform .35s cubic-bezier(.22,.61,.36,1)}
.modal-overlay.show .modal{transform:translateY(0)}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.modal-title{font-family:'Instrument Serif',serif;font-size:1.4rem;color:var(--text)}
.modal-close{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:transparent;color:var(--text-dim);font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
.form-group{margin-bottom:16px}
.form-label{font-family:'JetBrains Mono',monospace;font-size:.68rem;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);display:block;margin-bottom:6px}
.form-input{width:100%;padding:12px 14px;border-radius:10px;border:1px solid var(--border-light);background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:.95rem;outline:none;transition:border-color .2s}
.form-input:focus{border-color:var(--accent)}
.form-input::placeholder{color:var(--text-muted)}
textarea.form-input{min-height:180px;resize:vertical;font-family:'JetBrains Mono',monospace;font-size:.82rem;line-height:1.7}
.btn-primary{width:100%;padding:14px;border-radius:12px;border:none;background:var(--accent);color:var(--bg);font-family:'DM Sans',sans-serif;font-size:.95rem;font-weight:600;cursor:pointer;transition:all .2s;margin-top:8px}
.btn-primary:active{transform:scale(.97);filter:brightness(.9)}
.btn-secondary{width:100%;padding:12px;border-radius:10px;border:1px solid var(--border-light);background:transparent;color:var(--text-dim);font-family:'JetBrains Mono',monospace;font-size:.72rem;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;transition:all .2s;margin-top:6px}
.btn-secondary:active{border-color:var(--accent);color:var(--accent)}
.modal-divider{border:none;border-top:1px solid var(--border);margin:20px 0 16px}

.step-indicator{display:flex;gap:8px;align-items:center;margin-bottom:18px}
.step-dot{width:8px;height:8px;border-radius:50%;background:var(--border-light);transition:all .3s}
.step-dot.active{background:var(--accent);width:24px;border-radius:4px}
.step-back{font-family:'JetBrains Mono',monospace;font-size:.65rem;color:var(--text-muted);cursor:pointer;padding:4px 10px;border:1px solid var(--border);border-radius:6px;background:transparent;margin-left:auto;transition:all .2s}
.step-back:active{color:var(--accent);border-color:var(--accent)}

/* BADGE BAR */
.badge-bar{position:sticky;top:0;z-index:10;background:rgba(16,16,24,.95);backdrop-filter:blur(12px);padding:10px 14px;border-bottom:1px solid var(--border)}
.badge-row{display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-start;margin-bottom:6px}
.badge-pick{font-family:'JetBrains Mono',monospace;font-size:.58rem;letter-spacing:.05em;text-transform:uppercase;padding:5px 10px;border-radius:6px;border:1.5px solid var(--border);background:transparent;cursor:pointer;transition:all .15s}
.badge-pick:active{transform:scale(.93)}
.badge-pick.intro{color:var(--intro)}.badge-pick.verse{color:var(--verse)}.badge-pick.pre{color:var(--pre)}
.badge-pick.chorus{color:var(--chorus)}.badge-pick.bridge{color:var(--bridge)}.badge-pick.solo{color:var(--solo)}
.badge-pick.riff{color:var(--riff)}.badge-pick.pause{color:var(--pause)}.badge-pick.outro{color:var(--outro)}
.badge-pick.interlude{color:var(--interlude)}.badge-pick.link{color:var(--link)}
.badge-pick.active{border-width:2px;transform:scale(1.05)}
.badge-pick.intro.active{border-color:var(--intro);background:rgba(64,184,120,.12)}
.badge-pick.verse.active{border-color:var(--verse);background:rgba(136,152,168,.12)}
.badge-pick.pre.active{border-color:var(--pre);background:rgba(192,136,208,.12)}
.badge-pick.chorus.active{border-color:var(--chorus);background:rgba(224,104,152,.12)}
.badge-pick.bridge.active{border-color:var(--bridge);background:rgba(88,136,216,.12)}
.badge-pick.solo.active{border-color:var(--solo);background:rgba(240,192,64,.12)}
.badge-pick.riff.active{border-color:var(--riff);background:rgba(224,88,72,.12)}
.badge-pick.pause.active{border-color:var(--pause);background:rgba(96,104,120,.12)}
.badge-pick.outro.active{border-color:var(--outro);background:rgba(152,104,200,.12)}
.badge-pick.interlude.active{border-color:var(--interlude);background:rgba(106,176,160,.12)}
.badge-pick.link.active{border-color:var(--link);background:rgba(160,160,96,.12)}

.hint-text{font-family:'DM Sans',sans-serif;font-size:.75rem;color:var(--text-muted);text-align:left;padding:10px 14px;opacity:.7;line-height:1.5}

/* EDITOR LINES */
.ed-lines{margin-top:8px}
.ed-line{padding:7px 10px;font-family:'JetBrains Mono',monospace;font-size:.78rem;line-height:1.5;color:var(--text-dim);margin-bottom:0}
.ed-line.empty{min-height:14px}

/* Insert zone between lines */
.insert-zone{height:20px;cursor:pointer;display:flex;align-items:center;gap:6px;padding:0 10px;opacity:0;transition:opacity .15s}
.insert-zone:hover,.insert-zone:active{opacity:1!important}
.insert-zone .iz-line{flex:1;height:1px;background:var(--accent);opacity:.4}
.insert-zone .iz-label{font-family:'JetBrains Mono',monospace;font-size:.5rem;color:var(--accent);opacity:.7;white-space:nowrap}

/* Editor section dividers */
.ed-divider{display:flex;align-items:center;gap:8px;padding:8px 10px;margin:2px 0;border-radius:6px;transition:background .15s;flex-wrap:wrap}
.ed-divider .ed-dline{flex:1;height:1px;background:var(--border-light);min-width:20px}
.ed-divider .ed-badge{font-family:'JetBrains Mono',monospace;font-size:.58rem;letter-spacing:.06em;text-transform:uppercase;padding:3px 12px;border-radius:12px;flex-shrink:0}
.ed-divider .ed-badge.intro{background:rgba(64,184,120,.15);color:var(--intro)}
.ed-divider .ed-badge.verse{background:rgba(136,152,168,.12);color:var(--verse)}
.ed-divider .ed-badge.pre{background:rgba(192,136,208,.12);color:var(--pre)}
.ed-divider .ed-badge.chorus{background:rgba(224,104,152,.12);color:var(--chorus)}
.ed-divider .ed-badge.bridge{background:rgba(88,136,216,.12);color:var(--bridge)}
.ed-divider .ed-badge.solo{background:rgba(240,192,64,.15);color:var(--solo)}
.ed-divider .ed-badge.riff{background:rgba(224,88,72,.12);color:var(--riff)}
.ed-divider .ed-badge.pause{background:rgba(96,104,120,.15);color:var(--pause)}
.ed-divider .ed-badge.outro{background:rgba(152,104,200,.12);color:var(--outro)}
.ed-divider .ed-badge.interlude{background:rgba(106,176,160,.12);color:var(--interlude)}
.ed-divider .ed-badge.link{background:rgba(160,160,96,.12);color:var(--link)}
.ed-divider .ed-note{font-size:.68rem;font-style:italic;color:var(--accent);opacity:.75;cursor:pointer;padding:2px 6px;border-radius:4px;transition:background .15s}
.ed-divider .ed-note:active{background:rgba(212,160,52,.1)}
.ed-divider .ed-add-note{font-family:'JetBrains Mono',monospace;font-size:.55rem;color:var(--text-muted);opacity:.5;cursor:pointer;padding:2px 6px;border-radius:4px;transition:all .15s;letter-spacing:.04em}
.ed-divider .ed-add-note:active{opacity:1;color:var(--accent)}
.ed-divider .ed-x{font-size:.7rem;color:var(--riff);opacity:.4;cursor:pointer;padding:4px 6px;border-radius:4px;transition:all .15s;flex-shrink:0}
.ed-divider .ed-x:active{opacity:1;background:rgba(224,88,72,.1)}

.note-input-row{display:flex;gap:6px;margin:8px 0;padding:8px;background:var(--bg-raised);border-radius:8px;align-items:center}
.note-input-row input{flex:1;padding:8px 10px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:.82rem;outline:none}
.note-input-row input:focus{border-color:var(--accent)}
.note-input-row button{padding:8px 12px;border-radius:6px;border:none;background:var(--accent);color:var(--bg);font-family:'JetBrains Mono',monospace;font-size:.65rem;cursor:pointer;font-weight:500}
.note-input-row .skip-btn{background:transparent;color:var(--text-muted);border:1px solid var(--border)}

.empty-state{text-align:center;padding:60px 20px}
.empty-state .icon{font-size:2.5rem;margin-bottom:14px;opacity:.3}
.empty-state p{color:var(--text-muted);font-size:.85rem;line-height:1.6}
.scrolling-active{user-select:none}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border-light);border-radius:4px}
</style>
</head>
<body>
<div id="splash"><img id="splashLogo" alt="No Excuses"></div>
<div id="app">
  <header class="header">
    <div class="header-logo"><img id="headerLogo" alt="NE"><h1>Playlist</h1></div>
    <button class="btn-icon" onclick="openAddModal()" title="Aggiungi brano">&#xff0b;</button>
  </header>
  <main class="setlist" id="setlist"></main>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">Aggiungi Brano</span>
      <button class="modal-close" onclick="closeModal()">&#x2715;</button>
    </div>
    <div id="step1">
      <div class="step-indicator"><div class="step-dot active"></div><div class="step-dot"></div></div>
      <div class="form-group"><label class="form-label">Titolo</label><input type="text" class="form-input" id="inputTitle" placeholder="Es. Salvation"></div>
      <div class="form-group"><label class="form-label">Artista / Band</label><input type="text" class="form-input" id="inputArtist" placeholder="Es. The Cranberries"></div>
      <div class="form-group"><label class="form-label">Tonalit&agrave;</label><input type="text" class="form-input" id="inputKey" placeholder="Es. Em"></div>
      <div class="form-group"><label class="form-label">BPM</label><input type="number" class="form-input" id="inputBpm" placeholder="Es. 120"></div>
      <hr class="modal-divider">

document.getElementById('splashLogo').src=LOGO;
document.getElementById('headerLogo').src=LOGO;

const SK='noexcuses_v2';
let songs=load(),editIdx=null,scrollTimers={};
const SL={intro:'Intro',verse:'Strofa',pre:'Pre-Rit',chorus:'Ritornello',bridge:'Bridge',solo:'Solo',riff:'Riff',pause:'Pausa',outro:'Outro',interlude:'Interlude',link:'Link'};

/* items: [{t:'line',text:'...'}, {t:'div',type:'chorus',note:''}] */
let items=[],activeBadge=null;

function load(){try{return JSON.parse(localStorage.getItem(SK))||[]}catch{return[]}}
function sv(){localStorage.setItem(SK,JSON.stringify(songs))}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

window.addEventListener('load',()=>{setTimeout(()=>{document.getElementById('splash').classList.add('hide');document.getElementById('app').classList.add('show')},1800)});

/* =================== RENDER LIST =================== */
function render(){
  const el=document.getElementById('setlist');
  if(!songs.length){el.innerHTML='<div class="empty-state"><div class="icon">&#127928;</div><p>Nessun brano in playlist.<br>Premi <strong>+</strong> per aggiungerne uno.</p></div>';return}
  el.innerHTML='<div class="song-count">'+songs.length+' bran'+(songs.length===1?'o':'i')+' in playlist</div>'+songs.map((s,i)=>rSong(s,i)).join('');
}

function rSong(song,i){
  const types=[...new Set(song.items.filter(it=>it.t==='div').map(it=>it.type))];
  const tags=types.map(t=>'<span class="mini-tag '+t+'">'+SL[t]+'</span>').join('');
  const meta=[song.key,song.bpm?song.bpm+' bpm':''].filter(Boolean).join(' \u00b7 ');
  const sug=song.sugSpeed?'<div class="suggested-speed">\u2192 Velocit\u00e0 suggerita: '+song.sugSpeed+'</div>':'';

  let body='';
  song.items.forEach(it=>{
    if(it.t==='div'){
      body+='<div class="sec-divider"><span class="dline"></span><span class="dbadge '+it.type+'">'+SL[it.type]+'</span><span class="dline"></span></div>';
      if(it.note)body+='<div class="sec-note">'+esc(it.note)+'</div>';
    } else {
      body+='<div class="lyrics-display">'+esc(it.text)+'</div>';
    }
  });

  // Group consecutive lyrics-display into one block
  // Actually let's do that differently: collect lines between dividers
  body='';
  let buf=[];
  song.items.forEach(it=>{
    if(it.t==='div'){
      if(buf.length){body+='<div class="lyrics-display">'+buf.join('\n')+'</div>';buf=[]}
      body+='<div class="sec-divider"><span class="dline"></span><span class="dbadge '+it.type+'">'+SL[it.type]+'</span>'+(it.note?'<span class="sec-inline-note">'+esc(it.note)+'</span>':'')+'<span class="dline"></span></div>';
    } else {
      buf.push(esc(it.text));
    }
  });
  if(buf.length)body+='<div class="lyrics-display">'+buf.join('\n')+'</div>';

  return '<div class="song" id="song-'+i+'" style="--i:'+i+'"><div class="song-header"><div class="drag-handle" ontouchstart="dragStart(event,'+i+')" onmousedown="dragStart(event,'+i+')"><span></span><span></span><span></span></div><span class="song-num" onclick="toggle('+i+')">'+String(i+1).padStart(2,'0')+'</span><div class="song-info" onclick="toggle('+i+')"><div class="song-title">'+esc(song.title)+'</div>'+(song.artist?'<div class="song-artist">'+esc(song.artist)+'</div>':'')+(meta?'<div class="song-artist" style="color:var(--text-muted);font-size:.68rem;margin-top:1px">'+esc(meta)+'</div>':'')+(tags?'<div class="song-tags">'+tags+'</div>':'')+'</div><span class="chevron" onclick="toggle('+i+')">&#x25b6;</span></div>'
  +'<div class="song-body"><div class="song-content" id="sc-'+i+'">'
  +'<div class="scroll-control"><button class="scroll-btn" id="sb-'+i+'" onclick="toggleScr('+i+')">&#x25b6;</button>'
  +'<div class="speed-slider-wrap"><input type="range" class="speed-slider" id="sl-'+i+'" min="1" max="100" value="'+(song.speed||15)+'" oninput="onSl('+i+',this.value)"><span class="speed-value" id="sv-'+i+'">'+(song.speed||15)+'</span></div>'
  +'<button class="speed-save-btn" onclick="savSpd('+i+')">Suggerisci</button></div>'
  +sug+body
  +'<div class="song-actions"><button class="btn-small edit" onclick="editSong('+i+')">Modifica</button><button class="btn-small del" onclick="delSong('+i+')">Elimina</button></div>'
  +'</div></div></div>';
}

/* =================== TOGGLE & SCROLL =================== */
function toggle(i){
  const el=document.getElementById('song-'+i),w=el.classList.contains('open');
  document.querySelectorAll('.song.open').forEach(s=>{s.classList.remove('open');stopScr(+s.id.split('-')[1])});
  if(!w){el.classList.add('open');setTimeout(()=>el.scrollIntoView({behavior:'smooth',block:'start'}),100)}
}
let scrollAccum={};
function toggleScr(i){scrollTimers[i]?stopScr(i):startScr(i)}
function startScr(i){
  const btn=document.getElementById('sb-'+i),val=+document.getElementById('sl-'+i).value;
  btn.classList.add('active');btn.textContent='\u23f8';document.body.classList.add('scrolling-active');
  scrollAccum[i]=0;
  scrollTimers[i]=setInterval(()=>{
    scrollAccum[i]+=sPx(val);
    const px=Math.floor(scrollAccum[i]);
    if(px>=1){window.scrollBy({top:px,behavior:'instant'});scrollAccum[i]-=px}
  },16);
}
function stopScr(i){
  if(scrollTimers[i]){clearInterval(scrollTimers[i]);delete scrollTimers[i];delete scrollAccum[i]}
  const b=document.getElementById('sb-'+i);if(b){b.classList.remove('active');b.textContent='\u25b6'}
  document.body.classList.remove('scrolling-active');
}
function onSl(i,v){document.getElementById('sv-'+i).textContent=v;if(scrollTimers[i]){stopScr(i);startScr(i)}}
function sPx(v){return 0.02+v*v*0.003}
function savSpd(i){
  songs[i].sugSpeed=+document.getElementById('sl-'+i).value;
  songs[i].speed=songs[i].sugSpeed;sv();render();
  setTimeout(()=>document.getElementById('song-'+i).classList.add('open'),50);
}
function moveSong(from,to){if(from===to||to<0||to>=songs.length)return;const s=songs.splice(from,1)[0];songs.splice(to,0,s);sv();render()}
function delSong(i){if(!confirm('Eliminare "'+songs[i].title+'"?'))return;stopScr(i);songs.splice(i,1);sv();render()}

/* ---- DRAG TO REORDER ---- */
let dragIdx=null,dragEl=null,dragClone=null,dragStartY=0,dragOffY=0;
function dragStart(e,i){
  if(songs.length<2)return;
  e.preventDefault();e.stopPropagation();
  dragIdx=i;
  dragEl=document.getElementById('song-'+i);
  dragEl.classList.add('dragging');
  const touch=e.touches?e.touches[0]:e;
  const rect=dragEl.getBoundingClientRect();
  dragStartY=touch.clientY;
  dragOffY=touch.clientY-rect.top;
  // Clone for visual feedback
  dragClone=dragEl.cloneNode(true);
  dragClone.style.cssText='position:fixed;left:'+rect.left+'px;width:'+rect.width+'px;top:'+rect.top+'px;z-index:999;pointer-events:none;opacity:.85;border:1px solid var(--accent);border-radius:var(--radius);transition:none;';
  document.body.appendChild(dragClone);
  if(e.touches){
    document.addEventListener('touchmove',dragMove,{passive:false});
    document.addEventListener('touchend',dragEnd);
  } else {
    document.addEventListener('mousemove',dragMove);
    document.addEventListener('mouseup',dragEnd);
  }
}
function dragMove(e){
  e.preventDefault();
  const touch=e.touches?e.touches[0]:e;
  if(dragClone)dragClone.style.top=(touch.clientY-dragOffY)+'px';
  // Find which song we're over
  document.querySelectorAll('.song').forEach(s=>s.classList.remove('drag-over-top','drag-over-bottom'));
  const els=document.querySelectorAll('.song');
  for(let j=0;j<els.length;j++){
    const r=els[j].getBoundingClientRect();
    const mid=r.top+r.height/2;
    if(touch.clientY>r.top&&touch.clientY<r.bottom){
      const idx=parseInt(els[j].id.split('-')[1]);
      if(idx!==dragIdx){
        if(touch.clientY<mid)els[j].classList.add('drag-over-top');
        else els[j].classList.add('drag-over-bottom');
      }
    }
  }
}
function dragEnd(e){
  document.removeEventListener('touchmove',dragMove);document.removeEventListener('touchend',dragEnd);
  document.removeEventListener('mousemove',dragMove);document.removeEventListener('mouseup',dragEnd);
  if(dragClone){dragClone.remove();dragClone=null}
  const touch=e.changedTouches?e.changedTouches[0]:e;
  let targetIdx=dragIdx;
  const els=document.querySelectorAll('.song');
  for(let j=0;j<els.length;j++){
    const r=els[j].getBoundingClientRect();
    if(touch.clientY>r.top&&touch.clientY<r.bottom){
      targetIdx=parseInt(els[j].id.split('-')[1]);
      break;
    }
  }
  document.querySelectorAll('.song').forEach(s=>s.classList.remove('dragging','drag-over-top','drag-over-bottom'));
  if(targetIdx!==dragIdx)moveSong(dragIdx,targetIdx);
  dragIdx=null;dragEl=null;
}

/* =================== MODAL =================== */
function openAddModal(){editIdx=null;clearM();document.getElementById('modalTitle').textContent='Aggiungi Brano';document.getElementById('modalOverlay').classList.add('show');document.body.style.overflow='hidden';setTimeout(()=>document.getElementById('inputTitle').focus(),350)}
function closeModal(){document.getElementById('modalOverlay').classList.remove('show');document.body.style.overflow='';activeBadge=null}

function editSong(i){
  editIdx=i;const s=songs[i];clearM();
  document.getElementById('inputTitle').value=s.title;
  document.getElementById('inputArtist').value=s.artist||'';
  document.getElementById('inputKey').value=s.key||'';
  document.getElementById('inputBpm').value=s.bpm||'';
  items=JSON.parse(JSON.stringify(s.items));
  const text=items.filter(it=>it.t==='line').map(it=>it.text).join('\n');
  document.getElementById('inputFullText').value=text;
  document.getElementById('modalTitle').textContent='Modifica Brano';
  document.getElementById('modalOverlay').classList.add('show');document.body.style.overflow='hidden';
  goToStep2();
}

function clearM(){
  ['inputTitle','inputArtist','inputKey','inputBpm','inputFullText'].forEach(id=>document.getElementById(id).value='');
  items=[];activeBadge=null;
  document.getElementById('step1').style.display='';document.getElementById('step2').style.display='none';
  document.querySelectorAll('.badge-pick').forEach(b=>b.classList.remove('active'));
}

function goToStep1(){
  document.getElementById('inputFullText').value=items.filter(it=>it.t==='line').map(it=>it.text).join('\n');
  document.getElementById('step1').style.display='';document.getElementById('step2').style.display='none';
  document.getElementById('modal').scrollTop=0;
}

function goToStep2(){
  const title=document.getElementById('inputTitle').value.trim();
  if(!title){const el=document.getElementById('inputTitle');el.style.borderColor='var(--riff)';el.focus();setTimeout(()=>el.style.borderColor='',1500);return}

  const raw=document.getElementById('inputFullText').value;
  const newLines=raw.split('\n');

  // Rebuild: keep dividers in their positions (by line index), update lines
  const oldDivs=[];let li=0;
  items.forEach((it,idx)=>{if(it.t==='div')oldDivs.push({beforeLine:li,item:it});else li++});

  items=[];
  newLines.forEach((text,i)=>{
    oldDivs.filter(d=>d.beforeLine===i).forEach(d=>items.push({...d.item}));
    items.push({t:'line',text});
  });
  oldDivs.filter(d=>d.beforeLine>=newLines.length).forEach(d=>items.push({...d.item}));

  document.getElementById('step1').style.display='none';document.getElementById('step2').style.display='';
  activeBadge=null;renderEd();document.getElementById('modal').scrollTop=0;
}

/* =================== EDITOR =================== */
function pickBadge(btn){
  const type=btn.dataset.type;
  if(activeBadge===type){activeBadge=null;btn.classList.remove('active');document.getElementById('hintText').textContent='Seleziona un badge, poi tocca tra le righe dove inserirlo';renderEd();return}
  activeBadge=type;
  document.querySelectorAll('.badge-pick').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('hintText').innerHTML='Tocca tra le righe per inserire <strong>'+SL[type]+'</strong>';
  renderEd();
}

function renderEd(){
  const el=document.getElementById('edLines');
  let html='';
  // Insert zone before first item
  if(activeBadge)html+=insertZoneHtml(0);

  items.forEach((it,i)=>{
    if(it.t==='div'){
      const noteHtml=it.note?'<span class="ed-note" onclick="event.stopPropagation();editNote('+i+')">'+esc(it.note)+'</span>':'<span class="ed-add-note" onclick="event.stopPropagation();editNote('+i+')">+ nota</span>';
      html+='<div class="ed-divider" id="edDiv-'+i+'"><span class="ed-dline"></span><span class="ed-badge '+it.type+'">'+SL[it.type]+'</span>'+noteHtml+'<span class="ed-x" onclick="event.stopPropagation();removeDivider('+i+')" title="Rimuovi">&#x2715;</span><span class="ed-dline"></span></div>';
    } else {
      const empty=!it.text.trim();
      html+='<div class="ed-line'+(empty?' empty':'')+'">'+( empty?'&nbsp;':esc(it.text))+'</div>';
    }
    // Insert zone after each item
    if(activeBadge)html+=insertZoneHtml(i+1);
  });
  el.innerHTML=html;
}

function insertZoneHtml(pos){
  return '<div class="insert-zone" onclick="insertDiv('+pos+')" style="opacity:.25"><span class="iz-line"></span><span class="iz-label">+ '+SL[activeBadge]+'</span><span class="iz-line"></span></div>';
}

function insertDiv(pos){
  if(!activeBadge)return;
  items.splice(pos,0,{t:'div',type:activeBadge,note:''});
  renderEd();
  showNoteInput(pos);
}

function removeDivider(i){items.splice(i,1);renderEd()}

function showNoteInput(i){
  renderEd();
  _insertNoteInputAfter(i, '');
}

function editNote(i){
  _insertNoteInputAfter(i, items[i].note||'');
}

function _insertNoteInputAfter(i, val){
  // Remove any existing note input
  const old=document.querySelector('.note-input-row');
  if(old)old.remove();
  // Find the divider element and insert after it
  const divEl=document.getElementById('edDiv-'+i);
  if(!divEl)return;
  const noteDiv=document.createElement('div');
  noteDiv.className='note-input-row';
  noteDiv.innerHTML='<input type="text" id="noteInp" placeholder="Nota (es. 3 giri, distorsione ON...)" value="'+esc(val)+'" autocomplete="off" onkeydown="if(event.key===\'Enter\'){saveNt('+i+');event.preventDefault()}"><button onclick="saveNt('+i+')">OK</button><button class="skip-btn" onclick="skipNt()">Skip</button>';
  divEl.insertAdjacentElement('afterend', noteDiv);
  setTimeout(()=>{const inp=document.getElementById('noteInp');if(inp){inp.focus();inp.setSelectionRange(inp.value.length,inp.value.length)}},100);
}

function saveNt(i){items[i].note=(document.getElementById('noteInp')||{}).value?.trim()||'';renderEd()}
function skipNt(){renderEd()}

/* =================== SAVE =================== */
function saveSong(){
  const title=document.getElementById('inputTitle').value.trim();
  if(!title)return;
  const song={title,artist:document.getElementById('inputArtist').value.trim(),key:document.getElementById('inputKey').value.trim(),bpm:document.getElementById('inputBpm').value.trim(),items:items,speed:15,sugSpeed:null};
  if(editIdx!==null){song.speed=songs[editIdx].speed||15;song.sugSpeed=songs[editIdx].sugSpeed||null;songs[editIdx]=song}
  else songs.push(song);
  sv();closeModal();render();
  if(editIdx===null)setTimeout(()=>{const l=document.getElementById('song-'+(songs.length-1));if(l)l.scrollIntoView({behavior:'smooth',block:'center'})},200);
}

function skipAndSave(){
  const title=document.getElementById('inputTitle').value.trim();
  if(!title){const el=document.getElementById('inputTitle');el.style.borderColor='var(--riff)';el.focus();setTimeout(()=>el.style.borderColor='',1500);return}
  const raw=document.getElementById('inputFullText').value.trim();
  const its=raw?raw.split('\n').map(text=>({t:'line',text})):[];
  const song={title,artist:document.getElementById('inputArtist').value.trim(),key:document.getElementById('inputKey').value.trim(),bpm:document.getElementById('inputBpm').value.trim(),items:its,speed:15,sugSpeed:null};
  if(editIdx!==null)songs[editIdx]=song;else songs.push(song);
  sv();closeModal();render();
}

render();
</script>
</body>
</html>
