<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>No Excuses — Live</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@300;400;500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#06060a;--bg-card:#0e0e16;--bg-raised:#14141e;--bg-hover:#1a1a28;
  --text:#ebe9e4;--text-dim:#8a8890;--text-muted:#4a4850;
  --accent:#d4a034;--accent-glow:rgba(212,160,52,.25);
  --intro:#40b878;--verse:#8898a8;--pre:#c088d0;--chorus:#e06898;
  --bridge:#5888d8;--solo:#f0c040;--riff:#e05848;--pause:#606878;
  --outro:#9868c8;--interlude:#6ab0a0;--link:#a0a060;
  --border:rgba(255,255,255,.06);--border-light:rgba(255,255,255,.1);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;user-select:none}

/* ===== SCREENS ===== */
.screen{position:absolute;inset:0;display:flex;flex-direction:column;opacity:0;visibility:hidden;transition:opacity .35s,visibility .35s;overflow:hidden}
.screen.active{opacity:1;visibility:visible}

/* ===== HOME ===== */
.home-header{padding:20px 20px 0;display:flex;align-items:center;justify-content:space-between}
.home-brand{display:flex;align-items:baseline;gap:8px}
.home-brand h1{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:.08em;color:var(--text)}
.home-brand span{font-family:'JetBrains Mono',monospace;font-size:.6rem;color:var(--accent);letter-spacing:.15em;text-transform:uppercase}
.home-actions{display:flex;gap:8px}
.icon-btn{width:40px;height:40px;border-radius:50%;border:1px solid var(--border-light);background:var(--bg-card);color:var(--text-dim);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.1rem;transition:all .2s}
.icon-btn:active{background:var(--bg-hover);color:var(--accent);border-color:var(--accent);transform:scale(.92)}

.role-bar{display:flex;gap:6px;padding:16px 20px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.role-bar::-webkit-scrollbar{display:none}
.role-pill{font-family:'JetBrains Mono',monospace;font-size:.62rem;letter-spacing:.06em;text-transform:uppercase;padding:7px 14px;border-radius:20px;border:1px solid var(--border-light);background:transparent;color:var(--text-muted);cursor:pointer;white-space:nowrap;transition:all .2s;flex-shrink:0}
.role-pill.active{background:var(--accent);border-color:var(--accent);color:var(--bg);font-weight:500}

.song-list{flex:1;overflow-y:auto;padding:4px 16px 120px;-webkit-overflow-scrolling:touch}
.song-list::-webkit-scrollbar{width:0}
.empty-msg{text-align:center;padding:60px 20px;color:var(--text-muted);font-size:.9rem;line-height:1.6}
.empty-msg b{color:var(--text-dim);display:block;margin-bottom:4px;font-size:1rem}

.scard{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:8px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:all .2s}
.scard:active{background:var(--bg-hover);border-color:var(--border-light);transform:scale(.98)}
.scard-color{width:4px;height:40px;border-radius:2px;flex-shrink:0}
.scard-info{flex:1;min-width:0}
.scard-title{font-family:'Bebas Neue',sans-serif;font-size:1.15rem;letter-spacing:.04em;line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.scard-sub{font-size:.72rem;color:var(--text-muted);margin-top:2px;display:flex;gap:8px}
.scard-sub span{display:flex;align-items:center;gap:3px}
.scard-sections{display:flex;gap:3px;flex-shrink:0}
.scard-dot{width:6px;height:6px;border-radius:50%}
.scard-actions{display:flex;gap:6px;flex-shrink:0}
.scard-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:transparent;color:var(--text-muted);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.85rem;transition:all .2s}
.scard-btn:active{color:var(--accent);border-color:var(--accent)}
.scard-btn.live{background:var(--accent);border-color:var(--accent);color:var(--bg);font-size:.7rem;font-weight:700;font-family:'Bebas Neue',sans-serif;letter-spacing:.1em}

.fab{position:fixed;bottom:24px;right:20px;width:56px;height:56px;border-radius:50%;background:var(--accent);border:none;color:var(--bg);font-size:1.8rem;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 24px var(--accent-glow);transition:all .2s;z-index:50}
.fab:active{transform:scale(.9)}

/* ===== EDIT SONG ===== */
.edit-header{display:flex;align-items:center;gap:12px;padding:16px 20px;border-bottom:1px solid var(--border)}
.edit-header h2{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:.06em;flex:1}
.edit-body{flex:1;overflow-y:auto;padding:20px;-webkit-overflow-scrolling:touch}
.field{margin-bottom:16px}
.field label{font-family:'JetBrains Mono',monospace;font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);display:block;margin-bottom:6px}
.field input,.field select{width:100%;padding:12px 14px;border-radius:10px;border:1px solid var(--border-light);background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:.9rem;outline:none}
.field input:focus,.field select:focus{border-color:var(--accent)}
.field-row{display:flex;gap:10px}
.field-row .field{flex:1}

.sec-list{margin-top:20px}
.sec-list-title{font-family:'JetBrains Mono',monospace;font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.sec-item{display:flex;align-items:center;gap:10px;padding:12px;background:var(--bg-raised);border-radius:10px;margin-bottom:6px}
.sec-badge{font-family:'Bebas Neue',sans-serif;font-size:.85rem;letter-spacing:.08em;padding:4px 12px;border-radius:6px;min-width:70px;text-align:center}
.sec-time{font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--text-dim);min-width:50px}
.sec-notes-preview{font-size:.7rem;color:var(--text-muted);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sec-del{width:28px;height:28px;border-radius:50%;border:1px solid var(--border);background:transparent;color:var(--riff);opacity:.4;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.7rem;flex-shrink:0}
.sec-del:active{opacity:1;background:rgba(224,88,72,.1)}

.btn-map{width:100%;padding:14px;border-radius:12px;border:2px dashed var(--accent);background:rgba(212,160,52,.05);color:var(--accent);font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:.08em;cursor:pointer;transition:all .2s;margin-top:12px}
.btn-map:active{background:rgba(212,160,52,.12);transform:scale(.98)}
.btn-save{width:100%;padding:14px;border-radius:12px;border:none;background:var(--accent);color:var(--bg);font-family:'DM Sans',sans-serif;font-size:.95rem;font-weight:600;cursor:pointer;margin-top:12px}
.btn-save:active{filter:brightness(.85);transform:scale(.98)}

/* ===== NOTES MODAL ===== */
.notes-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(10px);z-index:300;display:flex;align-items:flex-end;justify-content:center;opacity:0;visibility:hidden;transition:all .3s}
.notes-overlay.show{opacity:1;visibility:visible}
.notes-panel{background:var(--bg-card);border:1px solid var(--border-light);border-radius:20px 20px 0 0;width:100%;max-width:500px;max-height:85dvh;overflow-y:auto;padding:24px 20px 40px;transform:translateY(100%);transition:transform .35s cubic-bezier(.22,.61,.36,1)}
.notes-overlay.show .notes-panel{transform:translateY(0)}
.notes-title{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:.06em;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.notes-title button{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);background:transparent;color:var(--text-dim);cursor:pointer;display:flex;align-items:center;justify-content:center}
.note-field{margin-bottom:12px}
.note-field label{font-family:'JetBrains Mono',monospace;font-size:.58rem;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);display:flex;align-items:center;gap:6px;margin-bottom:4px}
.note-field label .dot{width:8px;height:8px;border-radius:50%}
.note-field input{width:100%;padding:10px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:.85rem;outline:none}
.note-field input:focus{border-color:var(--accent)}
.note-save{width:100%;padding:12px;border-radius:10px;border:none;background:var(--accent);color:var(--bg);font-weight:600;cursor:pointer;margin-top:8px}

/* ===== TAP MAP ===== */
.map-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.map-header h2{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:.06em;flex:1}
.map-timer{font-family:'Bebas Neue',sans-serif;font-size:4rem;text-align:center;padding:30px 0 10px;letter-spacing:.04em;color:var(--text)}
.map-timer.running{color:var(--accent)}
.map-timeline{height:40px;margin:0 20px;border-radius:8px;background:var(--bg-raised);position:relative;overflow:hidden}
.map-tl-block{position:absolute;top:0;height:100%;border-radius:4px;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:.5rem;letter-spacing:.04em;text-transform:uppercase;color:rgba(255,255,255,.8);min-width:2px}
.map-tl-cursor{position:absolute;top:0;width:2px;height:100%;background:var(--accent);z-index:2;transition:left .1s linear}
.map-badges{display:flex;gap:5px;flex-wrap:wrap;padding:16px 20px;justify-content:center}
.map-badge{font-family:'JetBrains Mono',monospace;font-size:.58rem;letter-spacing:.05em;text-transform:uppercase;padding:6px 12px;border-radius:8px;border:2px solid var(--border);background:transparent;cursor:pointer;transition:all .15s}
.map-badge.sel{border-width:2px;transform:scale(1.08)}
.map-tap-zone{flex:1;display:flex;align-items:center;justify-content:center;margin:10px 20px;border-radius:16px;border:2px dashed var(--border-light);cursor:pointer;transition:all .15s;position:relative;overflow:hidden}
.map-tap-zone:active{border-color:var(--accent);background:rgba(212,160,52,.05)}
.map-tap-zone .tap-label{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:.1em;color:var(--text-muted)}
.map-tap-zone .tap-flash{position:absolute;inset:0;background:var(--accent);opacity:0;transition:opacity .08s}
.map-tap-zone:active .tap-flash{opacity:.15}
.map-controls{display:flex;gap:10px;padding:16px 20px 28px;justify-content:center}
.map-ctrl-btn{padding:14px 28px;border-radius:12px;border:none;font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:.08em;cursor:pointer;transition:all .2s}
.map-ctrl-btn.start{background:var(--accent);color:var(--bg)}
.map-ctrl-btn.stop{background:var(--riff);color:#fff}
.map-ctrl-btn.done{background:var(--intro);color:#fff}
.map-ctrl-btn.reset{background:transparent;border:1px solid var(--border);color:var(--text-muted)}
.map-ctrl-btn:active{transform:scale(.95)}

/* ===== LIVE MODE ===== */
.live{background:#000;position:relative}
.live-exit{position:fixed;top:12px;right:12px;z-index:400;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.5);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.9rem;opacity:0;transition:opacity .3s}
.live-exit:hover,.live-exit:active{opacity:1}
.live:hover .live-exit{opacity:.6}

/* Countdown */
.countdown{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10}
.countdown-num{font-family:'Bebas Neue',sans-serif;font-size:12rem;line-height:1;color:var(--accent);animation:countPop .4s ease}
.countdown-label{font-family:'JetBrains Mono',monospace;font-size:.8rem;color:var(--text-muted);letter-spacing:.15em;margin-top:12px;text-transform:uppercase}
.countdown-bpm{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;color:var(--text-dim);margin-top:4px}
@keyframes countPop{0%{transform:scale(1.4);opacity:0}100%{transform:scale(1);opacity:1}}

/* Slides */
.live-stage{position:absolute;inset:0;display:flex;overflow:hidden}
.slide{position:absolute;top:0;bottom:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 30px;transition:all .6s cubic-bezier(.25,.46,.45,.94);overflow:hidden}
.slide.full{left:0;width:100%}
.slide.half-left{left:0;width:50%;opacity:.5}
.slide.half-right{left:50%;width:50%;border-left:2px solid rgba(255,255,255,.1)}
.slide.out-left{left:-100%;width:50%;opacity:0}
.slide.out-right{left:100%;width:50%;opacity:0}

.slide-type{font-family:'Bebas Neue',sans-serif;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.95);text-shadow:0 2px 20px rgba(0,0,0,.5)}
.slide.full .slide-type{font-size:clamp(3rem,12vw,8rem)}
.slide.half-left .slide-type,.slide.half-right .slide-type{font-size:clamp(1.5rem,6vw,3.5rem)}
.slide-notes{font-family:'JetBrains Mono',monospace;color:rgba(255,255,255,.8);text-align:center;margin-top:16px;line-height:1.8;max-width:90%}
.slide.full .slide-notes{font-size:clamp(1rem,3.5vw,1.8rem)}
.slide.half-left .slide-notes,.slide.half-right .slide-notes{font-size:clamp(.65rem,2vw,1rem)}
.slide-next-label{position:absolute;bottom:20px;font-family:'JetBrains Mono',monospace;font-size:.6rem;color:rgba(255,255,255,.3);letter-spacing:.1em;text-transform:uppercase}

.live-progress{position:absolute;bottom:0;left:0;height:3px;background:rgba(255,255,255,.2);transition:width .2s linear;z-index:5}
.live-beat{position:absolute;top:12px;left:50%;transform:translateX(-50%);width:8px;height:8px;border-radius:50%;background:var(--accent);opacity:0;transition:opacity .05s;z-index:5}
.live-beat.flash{opacity:1}

.live-click-indicator{position:absolute;bottom:12px;right:12px;z-index:5;display:flex;align-items:center;gap:6px}
.click-dot{width:6px;height:6px;border-radius:50%;background:var(--text-muted);transition:all .1s}
.click-dot.on{background:var(--accent);transform:scale(1.3)}
.live-bpm{font-family:'JetBrains Mono',monospace;font-size:.55rem;color:var(--text-muted)}

/* ===== UTILS ===== */
@keyframes fadeInUp{0%{opacity:0;transform:translateY(12px)}100%{opacity:1;transform:translateY(0)}}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--accent);color:var(--bg);padding:10px 20px;border-radius:10px;font-size:.82rem;font-weight:600;z-index:999;animation:fadeInUp .3s ease}

@media(min-width:768px){
  body{display:flex;align-items:center;justify-content:center;padding:24px}
  .screen:not(.live){width:100%;max-width:480px;min-height:calc(100dvh - 48px);max-height:calc(100dvh - 48px);border-radius:18px;border:1px solid var(--border-light);box-shadow:0 8px 60px rgba(0,0,0,.4);position:relative}
  .live{border-radius:0;width:100vw;max-width:100vw;min-height:100dvh;max-height:100dvh;position:fixed;inset:0}
}
</style>
</head>
<body>

<!-- HOME SCREEN -->
<div class="screen active" id="homeScreen">
  <div class="home-header">
    <div class="home-brand"><h1>NE Live</h1><span>Conductor</span></div>
    <div class="home-actions">
      <button class="icon-btn" onclick="importSongs()" title="Importa">📥</button>
      <button class="icon-btn" onclick="exportLiveData()" title="Esporta">📤</button>
    </div>
  </div>
  <div class="role-bar" id="roleBar"></div>
  <div class="song-list" id="songList"></div>
  <button class="fab" onclick="addSong()">+</button>
</div>

<!-- EDIT SCREEN -->
<div class="screen" id="editScreen">
  <div class="edit-header">
    <button class="icon-btn" onclick="goHome()" style="font-size:.9rem">←</button>
    <h2 id="editTitle">Nuovo Brano</h2>
    <button class="icon-btn" onclick="deleteSong()" style="font-size:.85rem;color:var(--riff)">🗑</button>
  </div>
  <div class="edit-body">
    <div class="field"><label>Titolo</label><input id="fTitle" placeholder="Nome del brano"></div>
    <div class="field"><label>Artista</label><input id="fArtist" placeholder="Artista originale"></div>
    <div class="field-row">
      <div class="field"><label>BPM</label><input id="fBpm" type="number" placeholder="120"></div>
      <div class="field"><label>Time Signature</label>
        <select id="fTime"><option value="4">4/4</option><option value="3">3/4</option><option value="6">6/8</option></select>
      </div>
    </div>
    <div class="sec-list">
      <div class="sec-list-title"><span>Sezioni</span><span id="secCount">0</span></div>
      <div id="secListEl"></div>
    </div>
    <button class="btn-map" onclick="openMap()">🎯 Mappa i Tempi (Tap)</button>
    <button class="btn-save" onclick="saveSong()">Salva Brano</button>
  </div>
</div>

<!-- NOTES MODAL -->
<div class="notes-overlay" id="notesOverlay" onclick="if(event.target===this)closeNotes()">
  <div class="notes-panel">
    <div class="notes-title"><span id="noteSecName">Note Sezione</span><button onclick="closeNotes()">✕</button></div>
    <div id="noteFields"></div>
    <button class="note-save" onclick="saveNotes()">Salva Note</button>
  </div>
</div>

<!-- TAP MAP SCREEN -->
<div class="screen" id="mapScreen">
  <div class="map-header">
    <button class="icon-btn" onclick="closeMap()" style="font-size:.9rem">←</button>
    <h2>Mappa Tempi</h2>
  </div>
  <div class="map-timer" id="mapTimer">0:00.0</div>
  <div class="map-timeline" id="mapTimeline"><div class="map-tl-cursor" id="mapCursor" style="left:0"></div></div>
  <div class="map-badges" id="mapBadges"></div>
  <div class="map-tap-zone" id="mapTapZone" onclick="mapTap()">
    <div class="tap-flash"></div>
    <div class="tap-label">TAP PER SEGNARE</div>
  </div>
  <div class="map-controls" id="mapControls"></div>
</div>

<!-- LIVE SCREEN -->
<div class="screen live" id="liveScreen">
  <button class="live-exit" onclick="exitLive()">✕</button>
  <div class="countdown" id="liveCountdown" style="display:none"></div>
  <div class="live-stage" id="liveStage"></div>
  <div class="live-progress" id="liveProgress"></div>
  <div class="live-beat" id="liveBeat"></div>
  <div class="live-click-indicator">
    <span class="click-dot" id="clickDot1"></span>
    <span class="click-dot" id="clickDot2"></span>
    <span class="click-dot" id="clickDot3"></span>
    <span class="click-dot" id="clickDot4"></span>
    <span class="live-bpm" id="liveBpmLabel"></span>
  </div>
</div>

<script>
/* =================== STATE =================== */
const ROLES=[
  {id:'ch1',name:'Chitarra 1',color:'#d4a034'},
  {id:'ch2',name:'Chitarra 2',color:'#e0a848'},
  {id:'bass',name:'Basso',color:'#5888d8'},
  {id:'drums',name:'Batteria',color:'#e05848'},
  {id:'voice',name:'Voce',color:'#e06898'}
];
const SEC_TYPES=[
  {id:'intro',label:'Intro',color:'var(--intro)'},
  {id:'verse',label:'Strofa',color:'var(--verse)'},
  {id:'pre',label:'Pre-Rit',color:'var(--pre)'},
  {id:'chorus',label:'Ritornello',color:'var(--chorus)'},
  {id:'bridge',label:'Bridge',color:'var(--bridge)'},
  {id:'solo',label:'Solo',color:'var(--solo)'},
  {id:'riff',label:'Riff',color:'var(--riff)'},
  {id:'interlude',label:'Interlude',color:'var(--interlude)'},
  {id:'link',label:'Link',color:'var(--link)'},
  {id:'pause',label:'Pausa',color:'var(--pause)'},
  {id:'outro',label:'Outro',color:'var(--outro)'}
];
const SEC_COLORS={intro:'#40b878',verse:'#8898a8',pre:'#c088d0',chorus:'#e06898',bridge:'#5888d8',solo:'#f0c040',riff:'#e05848',pause:'#606878',outro:'#9868c8',interlude:'#6ab0a0',link:'#a0a060'};

let songs=[], role='ch1', editIdx=-1, editSections=[];
let mapRunning=false, mapStart=0, mapElapsed=0, mapRaf=0, mapSelectedType='intro';
let noteEditIdx=-1;

/* Audio */
let audioCtx=null;
function getAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx}

/* =================== STORAGE =================== */
function load(){
  try{songs=JSON.parse(localStorage.getItem('ne-live-songs'))||[]}catch(e){songs=[]}
  try{role=localStorage.getItem('ne-live-role')||'ch1'}catch(e){}
}
function save(){localStorage.setItem('ne-live-songs',JSON.stringify(songs));localStorage.setItem('ne-live-role',role)}

/* =================== NAV =================== */
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function goHome(){showScreen('homeScreen');renderHome()}

/* =================== HOME =================== */
function renderHome(){
  // Roles
  const rb=document.getElementById('roleBar');
  rb.innerHTML=ROLES.map(r=>'<button class="role-pill'+(r.id===role?' active':'')+'" onclick="setRole(\''+r.id+'\')">'+r.name+'</button>').join('');
  // Songs
  const sl=document.getElementById('songList');
  if(!songs.length){sl.innerHTML='<div class="empty-msg"><b>Nessun brano</b>Premi + per aggiungerne uno<br>oppure 📥 per importare</div>';return}
  sl.innerHTML=songs.map((s,i)=>{
    const dots=s.sections.map(sec=>'<span class="scard-dot" style="background:'+SEC_COLORS[sec.type]+'"></span>').join('');
    return '<div class="scard" style="animation-delay:'+(i*40)+'ms"><div class="scard-color" style="background:var(--accent)"></div><div class="scard-info"><div class="scard-title">'+esc(s.title)+'</div><div class="scard-sub"><span>'+esc(s.artist||'—')+'</span><span>♩ '+(s.bpm||'?')+'</span><span>'+s.sections.length+' sez.</span></div></div><div class="scard-sections">'+dots+'</div><div class="scard-actions"><button class="scard-btn" onclick="event.stopPropagation();editSong('+i+')" title="Modifica">✎</button><button class="scard-btn live" onclick="event.stopPropagation();startLive('+i+')">▶</button></div></div>'
  }).join('');
}
function setRole(r){role=r;save();renderHome()}

/* =================== EDIT =================== */
function addSong(){
  editIdx=-1;editSections=[];
  document.getElementById('editTitle').textContent='Nuovo Brano';
  document.getElementById('fTitle').value='';
  document.getElementById('fArtist').value='';
  document.getElementById('fBpm').value='120';
  document.getElementById('fTime').value='4';
  renderSections();showScreen('editScreen');
}
function editSong(i){
  editIdx=i;const s=songs[i];
  document.getElementById('editTitle').textContent='Modifica';
  document.getElementById('fTitle').value=s.title;
  document.getElementById('fArtist').value=s.artist||'';
  document.getElementById('fBpm').value=s.bpm||120;
  document.getElementById('fTime').value=s.timeSig||'4';
  editSections=JSON.parse(JSON.stringify(s.sections));
  renderSections();showScreen('editScreen');
}
function renderSections(){
  const el=document.getElementById('secListEl');
  document.getElementById('secCount').textContent=editSections.length;
  if(!editSections.length){el.innerHTML='<div style="text-align:center;padding:20px;color:var(--text-muted);font-size:.8rem">Usa "Mappa i Tempi" per aggiungere sezioni</div>';return}
  el.innerHTML=editSections.map((s,i)=>{
    const st=SEC_TYPES.find(t=>t.id===s.type)||SEC_TYPES[0];
    const notes=s.notes||{};const preview=notes[role]||'';
    return '<div class="sec-item" onclick="openNotes('+i+')"><span class="sec-badge" style="background:'+SEC_COLORS[s.type]+'22;color:'+SEC_COLORS[s.type]+'">'+st.label+'</span><span class="sec-time">'+fmtTime(s.time)+'</span><span class="sec-notes-preview">'+(preview?esc(preview):'<i style="opacity:.4">tap per note</i>')+'</span><button class="sec-del" onclick="event.stopPropagation();editSections.splice('+i+',1);renderSections()">✕</button></div>'
  }).join('');
}
function saveSong(){
  const t=document.getElementById('fTitle').value.trim();
  if(!t){toast('Inserisci un titolo');return}
  const obj={
    title:t,
    artist:document.getElementById('fArtist').value.trim(),
    bpm:parseInt(document.getElementById('fBpm').value)||120,
    timeSig:document.getElementById('fTime').value,
    sections:editSections
  };
  if(editIdx>=0)songs[editIdx]=obj;else songs.push(obj);
  save();goHome();toast('Brano salvato');
}
function deleteSong(){
  if(editIdx<0){goHome();return}
  if(confirm('Eliminare questo brano?')){songs.splice(editIdx,1);save();goHome();toast('Brano eliminato')}
}

/* =================== NOTES =================== */
function openNotes(i){
  noteEditIdx=i;const sec=editSections[i];
  const st=SEC_TYPES.find(t=>t.id===sec.type)||SEC_TYPES[0];
  document.getElementById('noteSecName').textContent='Note — '+st.label+' ('+fmtTime(sec.time)+')';
  const nf=document.getElementById('noteFields');
  const notes=sec.notes||{};
  nf.innerHTML=ROLES.map(r=>'<div class="note-field"><label><span class="dot" style="background:'+r.color+'"></span>'+r.name+'</label><input id="nf_'+r.id+'" value="'+esc(notes[r.id]||'')+'" placeholder="Indicazioni per '+r.name+'"></div>').join('');
  document.getElementById('notesOverlay').classList.add('show');
}
function closeNotes(){document.getElementById('notesOverlay').classList.remove('show')}
function saveNotes(){
  if(noteEditIdx<0)return;
  const notes={};
  ROLES.forEach(r=>{const v=document.getElementById('nf_'+r.id).value.trim();if(v)notes[r.id]=v});
  editSections[noteEditIdx].notes=notes;
  closeNotes();renderSections();
}

/* =================== TAP MAP =================== */
function openMap(){
  mapRunning=false;mapElapsed=0;
  // Keep existing sections if any, otherwise start fresh
  renderMapBadges();renderMapTimeline();renderMapTimer();renderMapControls();
  showScreen('mapScreen');
}
function closeMap(){renderSections();showScreen('editScreen')}
function renderMapBadges(){
  document.getElementById('mapBadges').innerHTML=SEC_TYPES.map(t=>'<button class="map-badge'+(t.id===mapSelectedType?' sel':'')+'" style="color:'+SEC_COLORS[t.id]+';border-color:'+(t.id===mapSelectedType?SEC_COLORS[t.id]:'var(--border)')+';'+(t.id===mapSelectedType?'background:'+SEC_COLORS[t.id]+'18':'')+'" onclick="selectMapType(\''+t.id+'\')">'+t.label+'</button>').join('');
}
function selectMapType(t){mapSelectedType=t;renderMapBadges()}
function renderMapTimer(){
  const el=document.getElementById('mapTimer');
  el.textContent=fmtTimeFull(mapElapsed);
  el.classList.toggle('running',mapRunning);
}
function renderMapTimeline(){
  const tl=document.getElementById('mapTimeline');
  const total=mapElapsed||editSections.reduce((m,s)=>Math.max(m,s.time),0)+10||60;
  let html='<div class="map-tl-cursor" id="mapCursor" style="left:'+(mapElapsed/total*100)+'%"></div>';
  editSections.forEach((s,i)=>{
    const nextTime=editSections[i+1]?editSections[i+1].time:total;
    const left=s.time/total*100;
    const width=Math.max((nextTime-s.time)/total*100,1);
    html+='<div class="map-tl-block" style="left:'+left+'%;width:'+width+'%;background:'+SEC_COLORS[s.type]+'60">'+SEC_TYPES.find(t=>t.id===s.type).label.substr(0,3)+'</div>';
  });
  tl.innerHTML=html;
}
function renderMapControls(){
  const mc=document.getElementById('mapControls');
  if(!mapRunning){
    mc.innerHTML='<button class="map-ctrl-btn start" onclick="startMap()">▶ Avvia</button><button class="map-ctrl-btn reset" onclick="resetMap()">Reset</button><button class="map-ctrl-btn done" onclick="closeMap()">✓ Fatto</button>';
  } else {
    mc.innerHTML='<button class="map-ctrl-btn stop" onclick="stopMap()">⏹ Stop</button>';
  }
}
function startMap(){
  mapRunning=true;mapStart=performance.now()-mapElapsed*1000;
  renderMapControls();tickMap();
}
function stopMap(){mapRunning=false;cancelAnimationFrame(mapRaf);renderMapControls()}
function resetMap(){mapElapsed=0;editSections=[];renderMapTimer();renderMapTimeline();renderMapControls()}
function tickMap(){
  if(!mapRunning)return;
  mapElapsed=(performance.now()-mapStart)/1000;
  renderMapTimer();
  const total=Math.max(mapElapsed+5,editSections.reduce((m,s)=>Math.max(m,s.time),0)+10);
  document.getElementById('mapCursor').style.left=(mapElapsed/total*100)+'%';
  mapRaf=requestAnimationFrame(tickMap);
}
function mapTap(){
  if(!mapRunning)return;
  playClick(true);
  editSections.push({type:mapSelectedType,time:Math.round(mapElapsed*10)/10,notes:{}});
  editSections.sort((a,b)=>a.time-b.time);
  renderMapTimeline();
  // Auto-advance to next logical section type
  const order=['intro','verse','pre','chorus','verse','pre','chorus','bridge','solo','chorus','outro'];
  const ci=order.indexOf(mapSelectedType);
  if(ci>=0&&ci<order.length-1){mapSelectedType=order[ci+1];renderMapBadges()}
}

/* =================== LIVE MODE =================== */
let liveSong=null,liveTimer=0,liveRunning=false,liveRaf=0,liveStart=0;
let liveBeat=0,liveLastBeatTime=0,liveCountdownLeft=0;
const ANTICIPATION=4; // seconds before next section to show preview

function startLive(i){
  liveSong=songs[i];
  if(!liveSong.sections.length){toast('Aggiungi sezioni prima di partire');return}
  showScreen('liveScreen');
  document.getElementById('liveBpmLabel').textContent=liveSong.bpm+' BPM';
  liveRunning=false;liveTimer=0;
  startCountdown();
}
function exitLive(){
  liveRunning=false;cancelAnimationFrame(liveRaf);
  if(audioCtx){audioCtx.close();audioCtx=null}
  goHome();
}

function startCountdown(){
  const bpm=liveSong.bpm||120;
  const beatMs=60000/bpm;
  const timeSig=parseInt(liveSong.timeSig)||4;
  liveCountdownLeft=timeSig;
  const cd=document.getElementById('liveCountdown');
  cd.style.display='flex';
  document.getElementById('liveStage').innerHTML='';

  function countBeat(){
    if(liveCountdownLeft<=0){
      cd.style.display='none';
      launchLive();return;
    }
    cd.innerHTML='<div class="countdown-num">'+liveCountdownLeft+'</div><div class="countdown-label">Pronti</div><div class="countdown-bpm">'+liveSong.bpm+' BPM</div>';
    playClick(liveCountdownLeft===timeSig);
    liveCountdownLeft--;
    setTimeout(countBeat,beatMs);
  }
  countBeat();
}

function launchLive(){
  liveRunning=true;liveStart=performance.now();liveBeat=0;liveLastBeatTime=0;
  renderLiveSlides(-1);
  tickLive();
}

function tickLive(){
  if(!liveRunning)return;
  liveTimer=(performance.now()-liveStart)/1000;
  const secs=liveSong.sections;
  const bpm=liveSong.bpm||120;
  const beatInterval=60/bpm;
  const timeSig=parseInt(liveSong.timeSig)||4;

  // Click
  if(liveTimer-liveLastBeatTime>=beatInterval){
    liveBeat++;liveLastBeatTime+=beatInterval;
    const accent=(liveBeat%timeSig===1);
    playClick(accent);
    flashBeatDot((liveBeat-1)%timeSig);
  }

  // Find current section
  let curIdx=-1;
  for(let j=secs.length-1;j>=0;j--){if(liveTimer>=secs[j].time){curIdx=j;break}}

  // Check anticipation for next
  const nextIdx=curIdx+1;
  let inAnticipation=false;
  if(nextIdx<secs.length){
    const timeToNext=secs[nextIdx].time-liveTimer;
    if(timeToNext<=ANTICIPATION&&timeToNext>0)inAnticipation=true;
  }

  renderLiveSlides(curIdx,inAnticipation?nextIdx:-1);

  // Progress
  if(curIdx>=0){
    const curStart=secs[curIdx].time;
    const curEnd=nextIdx<secs.length?secs[nextIdx].time:curStart+30;
    const pct=Math.min((liveTimer-curStart)/(curEnd-curStart)*100,100);
    document.getElementById('liveProgress').style.width=pct+'%';
    document.getElementById('liveProgress').style.background=SEC_COLORS[secs[curIdx].type]||'#fff';
  }

  // End check
  const lastSec=secs[secs.length-1];
  if(liveTimer>lastSec.time+30){exitLive();return}

  liveRaf=requestAnimationFrame(tickLive);
}

let lastRenderedState='';
function renderLiveSlides(curIdx,nextIdx){
  const state=curIdx+':'+nextIdx;
  if(state===lastRenderedState)return;
  lastRenderedState=state;

  const stage=document.getElementById('liveStage');
  const secs=liveSong.sections;

  if(curIdx<0){
    stage.innerHTML='<div class="slide full" style="background:#000"><div class="slide-type" style="opacity:.3">In attesa...</div></div>';
    return;
  }

  const curSec=secs[curIdx];
  const curColor=SEC_COLORS[curSec.type]||'#888';
  const curLabel=(SEC_TYPES.find(t=>t.id===curSec.type)||{}).label||curSec.type;
  const curNotes=(curSec.notes&&curSec.notes[role])||'';

  if(nextIdx>=0&&nextIdx<secs.length){
    // Split view
    const nSec=secs[nextIdx];
    const nColor=SEC_COLORS[nSec.type]||'#888';
    const nLabel=(SEC_TYPES.find(t=>t.id===nSec.type)||{}).label||nSec.type;
    const nNotes=(nSec.notes&&nSec.notes[role])||'';

    stage.innerHTML=
      '<div class="slide half-left" style="background:'+curColor+'18">'+
        '<div class="slide-type" style="color:'+curColor+'">'+curLabel+'</div>'+
        (curNotes?'<div class="slide-notes">'+esc(curNotes)+'</div>':'')+
      '</div>'+
      '<div class="slide half-right" style="background:'+nColor+'12">'+
        '<div class="slide-next-label" style="top:20px;bottom:auto">Prossima</div>'+
        '<div class="slide-type" style="color:'+nColor+'">'+nLabel+'</div>'+
        (nNotes?'<div class="slide-notes">'+esc(nNotes)+'</div>':'')+
      '</div>';
  } else {
    // Full view
    const isLast=curIdx===secs.length-1;
    stage.innerHTML=
      '<div class="slide full" style="background:'+curColor+'10">'+
        '<div class="slide-type" style="color:'+curColor+'">'+curLabel+'</div>'+
        (curNotes?'<div class="slide-notes">'+esc(curNotes)+'</div>':'')+
        (!isLast&&curIdx+1<secs.length?'<div class="slide-next-label">prossima: '+(SEC_TYPES.find(t=>t.id===secs[curIdx+1].type)||{}).label+'</div>':'')+
        (isLast?'<div class="slide-next-label">Ultimo giro!</div>':'')+
      '</div>';
  }
}

function flashBeatDot(idx){
  const timeSig=parseInt(liveSong?.timeSig)||4;
  for(let i=0;i<4;i++){
    const d=document.getElementById('clickDot'+(i+1));
    if(d){d.classList.toggle('on',i===idx);if(i>=timeSig)d.style.display='none';else d.style.display=''}
  }
  const bb=document.getElementById('liveBeat');
  bb.classList.add('flash');setTimeout(()=>bb.classList.remove('flash'),80);
}

/* =================== CLICK ENGINE =================== */
function playClick(accent){
  try{
    const ctx=getAudio();
    const osc=ctx.createOscillator();
    const gain=ctx.createGain();
    osc.connect(gain);gain.connect(ctx.destination);
    osc.frequency.value=accent?1200:800;
    osc.type='square';
    gain.gain.setValueAtTime(accent?.4:.2,ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.04);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime+.04);
  }catch(e){}
}

/* =================== IMPORT/EXPORT =================== */
function importSongs(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.json';
  inp.onchange=e=>{
    const f=e.target.files[0];if(!f)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        if(Array.isArray(data)&&data[0]&&data[0].title){
          // Import from NoExcuses Playlist format
          const imported=data.map(s=>({
            title:s.title||'',
            artist:s.artist||'',
            bpm:parseInt(s.bpm)||120,
            timeSig:'4',
            sections:(s.items||[]).filter(it=>it.t==='div').map((it,i)=>({
              type:it.type||'verse',
              time:i*15, // placeholder timing - needs tap-to-map
              notes:it.note?{ch1:it.note}:{}
            }))
          }));
          songs=songs.concat(imported);save();renderHome();
          toast(imported.length+' brani importati! Mappa i tempi per ogni brano.');
        } else if(Array.isArray(data)&&data[0]&&data[0].sections){
          // Import NE Live format
          songs=songs.concat(data);save();renderHome();
          toast(data.length+' brani importati');
        }
      }catch(err){toast('File non valido')}
    };
    reader.readAsText(f);
  };
  inp.click();
}
function exportLiveData(){
  const j=JSON.stringify(songs,null,2);
  const blob=new Blob([j],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);a.download='ne-live-data.json';
  document.body.appendChild(a);a.click();
  setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(a.href)},200);
}

/* =================== UTILS =================== */
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function fmtTime(s){const m=Math.floor(s/60);return m+':'+String(Math.floor(s%60)).padStart(2,'0')}
function fmtTimeFull(s){const m=Math.floor(s/60);const sec=Math.floor(s%60);const d=Math.floor((s%1)*10);return m+':'+String(sec).padStart(2,'0')+'.'+d}
function toast(msg){const t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2500)}

/* =================== INIT =================== */
load();renderHome();
</script>
